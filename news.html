<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;transition:background-color 0.4s ease,color 0.4s ease,border-color 0.4s ease,fill 0.4s ease}
:root{
  --bg:#0c0d0f;--surface:#111214;--surface2:#17191c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8e6e1;--muted:#6b6a66;--muted2:#9a9894;
  --red:#e24b4a;--red-dim:rgba(226,75,74,0.12);
  --amber:#ef9f27;--amber-dim:rgba(239,159,39,0.12);
  --blue:#4a9eff;--blue-dim:rgba(74,158,255,0.10);
  --green:#3dba7f;--green-dim:rgba(61,186,127,0.10);
  --purple:#9b8cf7;
  --bar-bg:rgba(12,13,15,0.92);
  --header-accent:#e24b4a;--header-accent-dim:rgba(226,75,74,0.15);
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',monospace;
  --sans:'Geist',system-ui,sans-serif;
}
[data-theme="light"]{
  --bg:#f5f5f0;--surface:#eaeae5;--surface2:#deded9;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.16);
  --text:#1a1a1a;--muted:#7a7a72;--muted2:#5a5a54;
  --red:#c43030;--red-dim:rgba(196,48,48,0.12);
  --amber:#c47f0a;--amber-dim:rgba(196,127,10,0.12);
  --blue:#2a7de0;--blue-dim:rgba(42,125,224,0.10);
  --green:#2a8f5e;--green-dim:rgba(42,143,94,0.10);
  --purple:#7a6ad0;
  --bar-bg:rgba(245,245,240,0.92);
  --header-accent:#c43030;--header-accent-dim:rgba(196,48,48,0.15);
}
html{scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none}html::-webkit-scrollbar{display:none}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
.pill{font-family:var(--mono);font-size:11px;background:var(--red-dim);border:1px solid rgba(226,75,74,.3);color:var(--red);padding:4px 12px;border-radius:20px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.alert{background:var(--red-dim);border-bottom:1px solid rgba(226,75,74,.2);padding:9px 2rem;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--red);font-family:var(--mono);overflow:hidden}
.alert strong{font-weight:500}
#alert-text{}
@keyframes marquee{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}.page{padding:2rem;max-width:1400px;margin:0 auto}
.sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:2rem}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0}
.mc.red::before{background:var(--red)}.mc.amber::before{background:var(--amber)}
.mc.blue::before{background:var(--blue)}.mc.green::before{background:var(--green)}
.mc.neutral::before{background:var(--muted)}
.ml{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.mv{font-family:var(--serif);font-size:26px;line-height:1;color:var(--text);margin-bottom:4px}
.ms{font-size:11px;color:var(--muted2)}.ms.up{color:var(--green)}.ms.dn{color:var(--red)}
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:2rem}
.lc,.rc{display:flex;flex-direction:column;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.ct{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.story{padding:12px 0;border-bottom:1px solid var(--border)}
.story:last-child{border-bottom:none;padding-bottom:0}
.story:first-child{padding-top:0}
.sh{display:flex;align-items:flex-start;gap:9px;margin-bottom:5px}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.d-crit{background:var(--red);box-shadow:0 0 6px rgba(226,75,74,.5)}
.d-high{background:var(--amber)}.d-mod{background:var(--blue)}.d-low{background:var(--green)}
.stitle{font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.sbody{font-size:12px;color:var(--muted2);line-height:1.55;padding-left:16px;margin-top:3px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;padding-left:16px}
.tag{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;letter-spacing:.04em}
.t-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(226,75,74,.2)}
.t-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(239,159,39,.2)}
.t-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(74,158,255,.2)}
.t-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(61,186,127,.2)}
.t-gray{background:var(--surface2);color:var(--muted2);border:1px solid var(--border)}
#map-card{flex:1;display:flex;flex-direction:column}
#map-wrap{width:100%;flex:1;min-height:260px;border-radius:8px;overflow:hidden;position:relative}
.map-bg{fill:#0e1520}
.map-land{fill:#161b24;stroke:rgba(255,255,255,0.08);stroke-width:0.4}
.map-marker{stroke:rgba(255,255,255,0.15);stroke-width:1}
.map-label{fill:rgba(232,230,225,0.65)}
.map-tip{background:#17191c;border:1px solid rgba(255,255,255,0.1);color:#e8e6e1}
.map-err{fill:#6b6a66}
[data-theme="light"] .map-bg{fill:#d8d8d0}
[data-theme="light"] .map-land{fill:#c8c8c0;stroke:rgba(0,0,0,0.12);stroke-width:0.4}
[data-theme="light"] .map-marker{stroke:rgba(0,0,0,0.2);stroke-width:1}
[data-theme="light"] .map-label{fill:rgba(30,30,30,0.6)}
[data-theme="light"] .map-tip{background:#eaeae5;border:1px solid rgba(0,0,0,0.12);color:#1a1a1a}
[data-theme="light"] .map-err{fill:#7a7a72}
.map-leg{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
.mli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2)}
.ld{width:7px;height:7px;border-radius:50%}
.mr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.mr:last-child{border-bottom:none}
.mn{font-size:12px;color:var(--text);flex:1;padding-right:10px;line-height:1.3}
.mright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.bbg{width:52px;height:3px;background:var(--border2);border-radius:3px;overflow:hidden}
.bb{height:3px;border-radius:3px}
.mp{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);min-width:30px;text-align:right}
.md{font-family:var(--mono);font-size:10px;min-width:32px;text-align:right}
.wi{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.5;color:var(--muted2)}
.wi:last-child{border-bottom:none;padding-bottom:0}
.wi:first-child{padding-top:0}
.wic{font-family:var(--mono);font-size:11px;flex-shrink:0;margin-top:1px;font-weight:500}
.wi strong{color:var(--text);font-weight:500}
.ch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.cv{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--red);text-align:right}
.cvs{font-size:10px;color:var(--muted);text-align:right;margin-top:1px}
.cl{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.cli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2)}
.cll{width:20px;height:2px;border-radius:2px}.clv{width:2px;height:12px;border-radius:1px}
#gc-wrap{position:relative;width:100%;height:260px}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:14px}
.stat{background:var(--surface2);border-radius:8px;padding:10px 12px}
.sl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.sv{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text)}
.ss{font-size:10px;color:var(--muted);margin-top:1px}
.hero{padding:2rem 0 1.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.hdate{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px}
.hhed{font-family:var(--serif);font-size:42px;line-height:1.05;color:var(--text);letter-spacing:-.02em}
.hhed em{color:var(--red);font-style:italic}
.hdek{font-size:13px;color:var(--muted2);margin-top:8px;max-width:520px;line-height:1.5}
.hcd{font-family:var(--mono);font-size:12px;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(239,159,39,.25);border-radius:8px;padding:10px 16px;line-height:1.6;text-align:right}
.hcd strong{font-size:22px;display:block;color:var(--red)}
.tleg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.tli{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
footer{border-top:1px solid var(--border);padding:16px 2rem;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 8px;color:var(--muted2)}
/* ── DESKTOP (>600px) ── */
@media(min-width:601px){
  #alert-text{animation:marquee 30s linear infinite;white-space:nowrap}
}

/* ── TABLET (≤900px) ── */
@media(max-width:900px){
  .main-grid{grid-template-columns:1fr}
  .rc{flex-direction:row;flex-wrap:wrap}
  .rc>.card{flex:1;min-width:280px}
  .metrics{grid-template-columns:repeat(3,minmax(0,1fr))}
  .hhed{font-size:34px}
}

/* ── MOBILE (≤600px) ── */
@media(max-width:600px){
  .pill{font-size:9px;padding:3px 8px;letter-spacing:0;white-space:normal}

  /* alert */
  .alert{padding:8px 1rem;font-size:11px}

  /* page padding */
  .page{padding:1rem}

  /* hero — stack, shrink */
  .hero{flex-direction:column;align-items:flex-start;padding:1.25rem 0 1rem}
  .hdate{font-size:10px;letter-spacing:.06em}
  .hhed{font-size:26px;line-height:1.1}
  .hdek{font-size:12px;max-width:100%}
  /* countdown full width on mobile */
  .hcd{width:100%;text-align:left;padding:10px 14px}
  .hcd strong{font-size:18px}

  /* metrics — horizontal scroll row */
  .metrics{
    grid-template-columns:repeat(5,140px);
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:6px;
    margin-bottom:1.25rem;
    gap:8px;
  }
  /* hide scrollbar but keep scroll */
  .metrics::-webkit-scrollbar{display:none}
  .mc{padding:12px 14px}
  .mv{font-size:22px}

  /* main grid — single column */
  .main-grid{grid-template-columns:1fr;gap:12px}
  .rc{flex-direction:column}
  .rc>.card{min-width:0}

  /* card padding */
  .card{padding:14px 16px}

  /* map — shorter on mobile */
  #map-wrap{min-height:200px}

  /* gas chart — hide annotation labels (too cramped), shorter */
  #gc-wrap{height:200px}

  /* gas chart annotations hidden via CSS — Chart.js still renders
     the lines but labels overflow; we clip the canvas overflow */
  #gc-wrap canvas{overflow:hidden}

  /* gas stat cards — 2 columns */
  .stats{grid-template-columns:repeat(2,minmax(0,1fr))}

  /* section label */
  .sec-label{font-size:9px}

  /* story body slightly smaller */
  .sbody{font-size:11px}

  /* polymarket bar narrower */
  .bbg{width:36px}

  /* footer — stack */
  footer{flex-direction:column;align-items:flex-start;padding:12px 1rem;gap:10px}
}

/* ── VERY SMALL (≤380px) ── */
@media(max-width:380px){
  .hhed{font-size:22px}
  .pill{max-width:none;font-size:8px;padding:2px 6px}
  .metrics{grid-template-columns:repeat(5,120px)}
  .nav-links{display:none}
  /* header bar adjustments */
  body > div[style*="display:flex"] {
    padding:0 0.5rem !important;
    gap:6px !important;
    flex-wrap:wrap !important;
    justify-content:flex-start !important;
  }
}
</style>
</head>

    { name:"Tehran",              lat:35.69, lon:51.39, type:"diplo", note:"DEAL MOMENTUM IMPROVING — May 28-29: Iran and US negotiators completed 60-day memorandum of understanding with all core terms finalized: (1) Strait control—unrestricted access (no tolls), 30-day Iranian mine removal, Joint Monitoring mechanism; (2) Nuclear program—uranium surrender sequencing agreed; (3) Sanctions relief—phased relief tied to verification; (4) Humanitarian aid—restoration framework. TURNING POINT: Trump added demands May 31-June 1 contradicting agreed MOU text, triggering Iran suspension June 1 and rejection threats June 2. CRITICAL SHIFT JUNE 4: Trump's \"talks going very well\" statement and market repricing optimistic (Brent -3.83%, Polymarket 73% by Dec 31) suggest traders perceive Trump concession or Iran conditional acceptance by June 4. Iran Foreign Minister Abbas Araghchi stated \"no significant progress\" but stressed war will end \"when it also ends in Lebanon\"—potentially signaling conditional engagement pending Lebanon ceasefire, which was agreed June 4. Iran's June 3-4 military escalation (Kuwait/Bahrain attacks, 63+ injured) perceived by traders as tactical pressure extraction rather than deal-breaker. Critical 3-4 day window June 4-7: if Iran formally accepts/conditionally accepts revised Trump proposal by June 5-6, deal likely finalizes June 8-10 with phased Strait reopening June 15-30; if Iran formally rejects by June 5-6, US-Iran escalation spiral 65-75% probable within 24-48 hours. Iran's June 5-6 Foreign Ministry response is critical deal fate trigger; acceptance signals finalization by mid-June, rejection triggers military escalation by June 6-7." },
    { name:"Qom",                 lat:34.64, lon:50.88, type:"diplo", note:"Nuclear program — sequencing deadlock unresolved; Trump wants immediate 10-year halt + 440kg uranium surrender; Iran refuses to discuss until war ends and sanctions lifted; no bridge visible by May 17" },
    { name:"Bushehr",             lat:28.97, lon:50.84, type:"strike", note:"Nuclear plant offline — likely target if military operations resume; offline status expected to continue pending nuclear deal resolution or military escalation" },
    { name:"Kharg Island",        lat:29.24, lon:50.32, type:"strike", note:"90% of Iran's crude exports — offline; vulnerable to military strikes if operations resume; would remain offline under continued blockade" },
    { name:"Mahshahr Petrochem",  lat:30.56, lon:49.20, type:"strike", note:"Export capability frozen — remains frozen under US blockade; likely target if military escalation authorized" },
    { name:"Abqaiq",              lat:25.93, lon:49.69, type:"strike", note:"Saudi facility offline — Iran likely target if Trump authorizes military; escalation scenario could trigger Iranian retaliatory strikes" },
    { name:"Strait of Hormuz",    lat:26.55, lon:56.50, type:"airdef", note:"BLOCKADE INDEFINITE — US military blockade in effect through June 2; 1,500+ vessels stranded; $2-4B daily shipping cost; 300-400% above baseline. Reopening terms were negotiated May 28-29 (unrestricted transit, 30-day mine removal, joint monitoring mechanism) but now disputed: Trump demands immediate opening with no phased timeline; Iran's agreed MOU specifies phased June 1-30 opening. Trump's added demands contradict negotiated framework; Iran rejects changes. Critical 3-5 day window June 2-7 determines Strait fate: (1) If Trump concedes by June 5, phased reopening June 15-30 expected with queued vessels transiting immediately upon announcement; (2) If Iran formally rejects by June 5, Strait remains indefinitely closed through summer 2026 with no reopening visible unless military escalation forces opening or deal eventually emerges. Current trajectory (deal collapse baseline) suggests Strait closed through June with <30% reopening probability by mid-June if deal fails." },
    { name:"Kuwait",              lat:29.37, lon:47.99, type:"strike", note:"IRAN DRONE & MISSILE ATTACK JUNE 3-4 — Iran's IRGC conducted coordinated missile and drone attack on Kuwait International Airport early June 4 (attack initiated by IRGC in response to US strikes on Qeshm Island June 3). Attack resulted in 63+ injured, damaged airport facilities including diplomatic missions, forced closure of airport with flight suspensions/diversions. Kuwait Foreign Ministry condemned attack as \"blatant acts of aggression\" violating international law. Despite immediate military escalation (first major Iranian attack on third country since April), markets repriced OPTIMISTIC on peace deal: Brent crashed 3.83%, Polymarket odds surged to 73% by Dec 31, traders assess 45-55% deal approval probability (up from 20-25% June 2). Traders' assessment: Iran's attack represents tactical pressure to extract Trump concessions rather than strategic deal-breaker; attack intensity consistent with leverage play to demonstrate commitment to Tehran hardline while preserving negotiation viability. Kuwaiti Foreign Minister Sheikh Jarrah Jaber Al-Ahmad Al-Sabah scheduled Washington visit June 4-5 to meet US Secretary of State Marco Rubio, indicating regional coordination with US on response. Attack timeline suggests Iran signaling willingness to escalate militarily while maintaining negotiation channel—classic leverage extraction posture. Critical 48-hour window June 4-6: if Iran signals acceptance by June 5-6, attack frames itself as pre-deal leverage play; if Iran rejects, attack signals escalation commitment and triggers US-Iran spiral." },
    { name:"UAE",                 lat:24.50, lon:54.40, type:"diplo", note:"Coastal watch — Iran's May 15 drone attacks suggest willingness to escalate GCC if feeling cornered; blockade persistence and military authorization risk could trigger broader Iranian response" },
    { name:"Qatar",               lat:25.28, lon:51.53, type:"airdef", note:"Port monitoring — Strait blockade persists; Qatar's LNG exports constrained; no reopening visible unless deal emerges (unlikely by current trajectory)" },
    { name:"Bahrain",             lat:26.07, lon:50.55, type:"airdef", note:"Shipping hub — Strait remains closed; port operations constrained by blockade; no recovery visible pending deal or military escalation outcome" },
    { name:"Saudi Arabia",        lat:26.50, lon:44.00, type:"diplo", note:"Monitoring closely — Saudi requested Project Freedom pause for diplomacy May 4-6; pause lasted 2 days before talks broke down May 8; Saudi now faces potential US military resumption if negotiations fail May 20-22" },
    { name:"Lebanon",             lat:33.80, lon:35.80, type:"diplo", note:"CEASEFIRE FRAMEWORK AGREED JUNE 4 BUT VIOLATIONS IMMEDIATE; FRAGILE BUT SURVIVING — Israel and Lebanon announced ceasefire framework implementation June 4 with explicit terms: (1) Israel ceases strikes on Beirut suburbs controlled by Hezbollah; (2) Hezbollah halts cross-border attacks on Israel; (3) Lebanese presidency confirmed Hezbollah agreement to US ceasefire proposal; (4) Both parties to reconvene June 22 for formalization. Israeli forces and Hezbollah fighters launched attacks within hours of announcement (late June 3-early June 4), creating immediate violations but framework survived initial 24-hour stress test. Trump exerted direct leverage on Netanyahu with statement: \"there will be no Troops going to Beirut, and any Troops that are on their way, have already been turned back.\" This indicates Trump successfully limited Israeli Beirut operations scope despite Netanyahu's prior contradictions (June 1-3). 3,500+ killed in Lebanon since March 2; 10,395 wounded; casualty pace rising through June. CRITICAL SHIFT JUNE 4: Markets repriced OPTIMISTIC on ceasefire survival despite immediate violations, with Brent down 3.83% and Polymarket odds surged to 73% by Dec 31. Traders assess ceasefire holds through June 22 reconvene if Trump's Beirut operations leverage proves effective. If ceasefire holds through June 6 without major Israeli Beirut strikes, Iran less likely to authorize Hezbollah escalation independent of US-Iran deal outcome. This removes second escalation vector that dominated June 1-3 threat assessment. Critical 48-hour window June 4-6: Netanyahu's Beirut operations compliance will signal ceasefire viability and determine Iran's Hezbollah authorization decision. If Israel restrains, ceasefire likely survives through June 22 date; if Israel continues Beirut strikes despite Trump pressure, Iran likely authorizes Hezbollah retaliation by June 5-6 regardless of US-Iran deal outcome." },
    { name:"N. Israel (Hezbollah)", lat:33.20, lon:35.57, type:"diplo", note:"Restrained under ceasefire but casualties rising; 670+ killed since ceasefire began; if Trump authorizes military May 21-22 and Iran signals escalation, Hezbollah likely to escalate sharply May 23-24" },
    { name:"Haifa",               lat:32.82, lon:34.99, type:"airdef", note:"Hezbollah attacks minimal under ceasefire; would escalate sharply if Iran signals escalation following Trump military authorization; Israeli-Lebanon war escalates if ceasefire collapses May 23-24" },
    { name:"Tel Aviv",            lat:32.08, lon:34.78, type:"diplo", note:"Monitoring Trump-Iran negotiations — if negotiations fail and Trump authorizes military May 21-22, IDF escalation against Hezbollah likely; Israeli-Lebanon war active phase likely May 24-27" },
    { name:"CVN-72 Arabian Sea",  lat:21.00, lon:62.00, type:"naval",  note:"USS Abraham Lincoln — Project Freedom paused May 6; pause likely to end May 20-22 if Trump authorizes military resumption; combat operations resumption expected if Iran talks fail" },
    { name:"CVN-78 E.Med",        lat:35.00, lon:28.50, type:"naval",  note:"USS Gerald R. Ford — Eastern Mediterranean supporting Israel; if Trump authorizes military against Iran, escalation likely involves expanded naval operations in multiple theaters" },
    { name:"Islamabad",           lat:33.72, lon:73.06, type:"diplo",  note:"Pakistan's mediation role ended; Trump rejected Xi's mediation framework May 16; Pakistan's back-channel role, if any, unlikely to influence Trump's May 20-22 military authorization decision" },
    { name:"Washington DC",       lat:38.91, lon:-77.04, type:"diplo", note:"DEAL MOMENTUM IMPROVING: TRUMP CONCESSION LIKELY — June 4-7 CRITICAL WINDOW — MOU framework completed May 28-29 and acceptable to both negotiating teams. Trump's May 31-June 1 demand additions (immediate Strait opening, lump-sum uranium surrender) created June 2-3 deadlock, with traders repricing deal odds from 60-70% (May 30) to 20-25% (June 2). CRITICAL SHIFT June 4: Trump tells aides talks going \"very well\"; Brent crashes 3.83% to $94.42; gas reprices down to $4.241; Polymarket odds surge to 73% by Dec 31 (up from 68%), 25% by June 30 (up from 20-28%); traders assess deal approval probability increased from 20-25% (June 2) to 45-55% (June 4). Market repricing despite Iran's June 3-4 military attacks (Kuwait/Bahrain, 63+ injured) suggests traders perceive: (1) Trump made major concession on Strait phased opening and/or uranium sequencing by June 4; (2) Iran signaled conditional acceptance by June 4; (3) Iran's military attacks perceived as tactical pressure extraction rather than deal-breaker. Polymarket timeframe data shows trader skepticism on near-term resolution (5% by June 7) but growing confidence long-term (73% by December 31), suggesting traders expect deal finalization by mid-June followed by implementation through year-end. Iran Foreign Minister Abbas Araghchi stated \"no significant progress\" and stressed war will only end \"when it also ends in Lebanon,\" but Israel-Lebanon ceasefire framework agreed June 4 signals potential resolution. Critical 3-4 day window June 4-7 determines Trump-Iran fate: (1) If Iran formally accepts/conditionally accepts by June 5-6: deal likely finalizes by June 8-10, Strait reopening phased June 15-30, gas reprices to $4.10-4.20, oil reprices to $85-92 within 24-48h of announcement; (2) If Iran formally rejects by June 5-6: escalation spiral 65-75% probable within 24-48h with US-Iran military exchange and Hezbollah authorization by June 6-7. Iran's June 5-6 response (acceptance vs rejection language) is critical deal fate trigger. Trump's public statements June 4-7 (concession language vs reaffirmation of demands) will telegraph negotiation position 24-48 hours before outcome." },

  watchItems: [
    { icon:"!!!", iconColor:"var(--green)", text:"<strong>IRAN FORMAL RESPONSE CRITICAL TRIGGER EXPECTED JUNE 5-6; ACCEPTANCE VS REJECTION DETERMINES DEAL FATE — Trump \"talks very well\" but traders pricing skepticism on June 7 deadline (5% probability)</strong> — Trump told aides negotiations going \"very well\" June 4; markets repriced optimistic with Brent down 3.83% and Polymarket 73% by Dec 31. However, Polymarket shows only 5% probability by June 7, reflecting trader skepticism on imminent resolution. Iran Foreign Minister Abbas Araghchi stated \"no significant progress\" June 4, contradicting Trump's upbeat language. Iran Foreign Ministry expected to formally respond to Trump's latest proposal by June 5-6. CRITICAL TRIGGER: response language will determine deal fate. If acceptance or conditional acceptance with bridge-building language = deal likely finalizes June 8-10 with Strait reopening June 15-30; if formal rejection = US-Iran escalation spiral 65-75% probable within 24-48 hours. Iran's response language more important than military actions (Kuwait/Bahrain attacks now perceived as leverage extraction, not deal-breaker). Watch: Iran Foreign Ministry statements (key word: \"acceptance\" vs \"rejection\" vs \"conditions\" signals deal likelihood), continued Iranian military attacks (pattern indicates leverage posture vs escalation commitment), any hardline statements from IRGC (internal politics signal)." },
    { icon:"!!",  iconColor:"var(--amber)", text:"<strong>NETANYAHU BEIRUT OPERATIONS COMPLIANCE THROUGH JUNE 6 — Israel operations supposedly halted per Trump statement but evacuation orders remain active</strong> — Trump stated June 4: \"there will be no Troops going to Beirut, and any Troops that are on their way, have already been turned back.\" This suggests Trump exerted leverage to limit Israeli Beirut scope. However, Israeli military issued evacuation orders for Beirut Dahiyeh (June 1-3) indicating planned Beirut strikes may continue. Netanyahu historically defied Trump on Lebanon operations (June 1-3 contradictions). If Netanyahu continues Beirut strikes despite Trump's direct statement and ceasefire framework, Iran likely to authorize Hezbollah retaliation by June 5-6 independent of US-Iran deal outcome, creating second escalation vector. Ceasefire framework survives initial violations (June 3-4 attacks reported but framework intact); Netanyahu's June 4-6 operations will determine framework viability. Watch: Netanyahu public statements on Lebanon scope, Israeli military actions in Beirut/southern Lebanon (watch for evacuation order follow-through), Hezbollah response tempo changes (zero escalation = restraint signal, any increase = authorization signal)." },
    { icon:"!!",  iconColor:"var(--amber)", text:"<strong>IRAN MILITARY ESCALATION PATTERN ASSESSMENT: KUWAIT/BAHRAIN ATTACKS JUNE 3-4 AS LEVERAGE OR COMMITMENT TEST — IRGC attacked Kuwait airport, Bahrain; 63+ injured; traders repriced optimistic despite attacks</strong> — Iran's June 3-4 attacks (coordinated missile/drone strikes on Kuwait airport, Bahrain) represent first major escalation beyond Israel-Hezbollah theater. Attacks motivated by retaliation for US strikes on Qeshm Island (June 3) per IRGC statement. Despite immediate military escalation, markets repriced optimistic on deal odds, suggesting traders perceive attacks as tactical pressure extraction (demonstrating escalation readiness) rather than strategic deal-breaker commitment. This interpretation assumes Iran wants to: (1) extract maximum Trump concessions by demonstrating Tehran hardline commitment; (2) maintain negotiation viability by limiting attack scope (no US targets, only regional allies) and responding to US actions (not initiating). If pattern continues with continued attacks on regional allies but restraint toward US direct targets through June 6, suggests leverage play; if attacks expand to US targets or escalate in intensity, suggests deal rejection probability rising. Watch: IRGC attack patterns (escalation vs plateau), target selection (regional vs US direct), Iranian military communications (escalation rhetoric vs leverage language), timing relative to negotiations." },
    { icon:"!",   iconColor:"var(--green)", text:"<strong>HEZBOLLAH RESTRAINT SUSTAINABILITY THROUGH JUNE 6 — Zero attacks maintained despite Kuwait/Bahrain escalation; restraint signal IMPROVED after Lebanon ceasefire framework</strong> — Hezbollah has maintained zero escalation through June 4 despite Kuwait/Bahrain attacks and ceasefire framework violations (Israeli/Hezbollah attacks within hours of June 4 announcement). Maintained restraint through 72-hour post-ceasefire period suggests Hezbollah waiting for: (1) Iran's formal US-Iran deal response (if acceptance, restraint justifiable by ceasefire framework and deal finalization); (2) Netanyahu's Beirut operations compliance (if Israel restrains, ceasefire framework holds and escalation unnecessary). If Hezbollah escalates by June 6, indicates Iran authorized retaliation and either: (a) US-Iran deal negotiations collapsed; or (b) Netanyahu continued Beirut strikes triggering independent Iranian authorization. Improved from June 1-3 when escalation appeared imminent; Trump's Beirut pressure and ceasefire framework appear effective restraint tools. Watch: Hezbollah attack frequency and intensity (zero through June 6 = restraint signal, any increase = authorization signal), timing relative to Iran Foreign Ministry response and Netanyahu Beirut updates, Lebanese military coordination with ceasefire framework." },
    { icon:"!",   iconColor:"var(--green)", text:"<strong>OIL & GAS REPRICING DIRECTION REFLECTS TRADER DEAL ASSESSMENT — Brent $94.42, gas $4.241; repricing window June 5-7 as Iran response/ceasefire compliance trigger decisions</strong> — Oil and gas repricing on June 4 (Brent down 3.83%, gas down 2¢) already reflects trader shift from deal-collapse baseline (June 2-3) to deal-likely baseline (June 4). Further repricing likely June 5-7 as Iran formal response and Netanyahu Beirut compliance determine deal/escalation probability. Traders expect: if Iran accepts by June 5-6 = Brent reprices toward $85-92 within 24 hours, gas reprices toward $4.10-4.15 within 24 hours (deal-approval signals); if escalation spiral June 6-7 = Brent reprices above $100 within 48 hours, gas reprices above $4.50 within 48 hours (escalation-confirmation signals). Current positions ($94.42 Brent, $4.241 gas) represent deal-likely baseline; further moves will signal probability shifts. Repricing sensitivity: 1¢ gas move = 10-15% deal probability shift (volatility sustained). Watch: AAA daily prices (most sensitive indicator), Brent/WTI futures moves, timing relative to Iran Foreign Ministry statements (response language), Netanyahu/Israeli military announcements (Beirut operations), Polymarket odds movements (early signal of trader reassessment before formal news confirmation)." },

<script>

  } else {
    $('countdown-label').textContent = C.countdown.label;
    $('countdown-sub').textContent = C.countdown.sub;
    const target = new Date(C.countdown.target);
    function tick() {
      const diff = target - new Date();
      if (diff <= 0) { $('countdown').textContent = 'EXPIRED'; return; }
      const h = Math.floor(diff/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      $('countdown').textContent = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }
    tick(); setInterval(tick, 1000);
  }

  // metrics
  $('metrics-row').innerHTML = C.metrics.map(m=>`

  $('watch-list').innerHTML = C.watchItems.map(w=>`

        <div style="width:${t.pct}%;height:100%;background:${t.color};border-radius:4px"></div>
      </div>
    </div>`).join('');

  // gas chart header
  $('gas-title').textContent = C.gasTitle;
  $('gas-sub').textContent   = C.gasSub;
  $('gas-val').textContent   = C.gasCurrentVal;
  $('gas-val-sub').textContent = C.gasCurrentSub;

  // gas stat cards
  $('gas-stats').innerHTML = C.gasStats.map(s=>`
    <div class="stat">
      <div class="sl">${s.label}</div>
      <div class="sv"${s.red?' style="color:var(--red)"':''}>${s.value}</div>
      <div class="ss">${s.sub}</div>
    </div>`).join('');

  // footer sources
  $('footer-chips').innerHTML = C.sources.map(s=>`<span class="chip">${s}</span>`).join('');

  // ── GAS CHART ──────────────────────────────────────────────
  const gLabels = C.gasData.map(d=>d.date);
  const gPrices = C.gasData.map(d=>d.price);
  const splitIdx = C.gasSplitIdx;
  const ptColors = gPrices.map((_,i)=>i>=splitIdx?'#e24b4a':'#4a9eff');

  const isMobile = window.innerWidth <= 600;

  // Assign vertical tiers to avoid label overlap.
  // Threshold 1.4 x-units (~one label width) before reusing a tier; 32px between tiers > 30px label box height.
  const tierLast = [];
  const evTiers = C.gasEvents.map(ev => {
    for (let t = 0; ; t++) {
      if (tierLast[t] === undefined || ev.index - tierLast[t] >= 1.4) {
        tierLast[t] = ev.index;
        return t;
      }
    }
  });

  const annotations = {};
  C.gasEvents.forEach((ev,i)=>{
    annotations['vl'+i] = { type:'line', xMin:ev.index, xMax:ev.index, borderColor:ev.color, borderWidth:1.5, borderDash:[4,3] };
    if(!isMobile) annotations['lb'+i] = {
      type:'label', xValue:ev.index, yValue:C.gasYMax,
      yAdjust: -(20 + evTiers[i] * 32),
      content:ev.label, color:ev.color,
      font:{ size:9, weight:'500', family:"'DM Mono',monospace" },
      textAlign:'center'
    };
  });

  new Chart(document.getElementById('gasChart').getContext('2d'), {
    type:'line',
    data:{ labels:gLabels, datasets:[{
      data:gPrices, borderWidth:2.5,
      pointRadius:gPrices.map((_,i)=>i===0||i===7||i===gPrices.length-1?5:3),
      pointBackgroundColor:ptColors, pointBorderColor:ptColors,
      fill:true,
      backgroundColor:function(c){
        const{ctx:cx,chartArea}=c.chart;
        if(!chartArea)return'transparent';
        const g=cx.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
        g.addColorStop(0,'rgba(226,75,74,0.18)');
        g.addColorStop(0.6,'rgba(74,158,255,0.08)');
        g.addColorStop(1,'rgba(74,158,255,0.01)');
        return g;
      },
      segment:{ borderColor:c=>c.p1DataIndex>=splitIdx?'#e24b4a':'#4a9eff' },
      tension:0.4
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ top: isMobile ? 16 : 110 } },
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            label:v=>' $'+v.parsed.y.toFixed(2)+' / gal',
            afterLabel:v=>v.dataIndex>=splitIdx?'  ⚠ disruption period':''
          },
          backgroundColor:'#17191c', titleColor:'#e8e6e1', bodyColor:'#9a9894',
          borderColor:'rgba(255,255,255,0.1)', borderWidth:1, padding:10
        },
        annotation:{ annotations }
      },
      scales:{
        x:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{ color:'#6b6a66', font:{size:10}, maxRotation:45, autoSkip:false, callback:function(v,i){return isMobile ? (i%4===0?this.getLabelForValue(v):'') : (i%2===0?this.getLabelForValue(v):'')} } },
        y:{ min:C.gasYMin, max:C.gasYMax, grid:{color:'rgba(255,255,255,0.05)'}, ticks:{ color:'#6b6a66', font:{size:10}, callback:v=>'$'+v.toFixed(2) } }
      }
    }
  });

  // ── MAP ────────────────────────────────────────────────────
  const colorMap = { strike:'#e24b4a', airdef:'#ef9f27', naval:'#4a9eff', actor:'#9b8cf7', diplo:'#3dba7f' };
  const legendLabels = { strike:'strikes / hit', airdef:'air defenses active', naval:'US naval assets', actor:'other actors', diplo:'ceasefire mediators' };

  $('map-title').textContent = C.mapTitle;

  // legend — only show types that exist in markers
  const usedTypes = [...new Set(C.markers.map(m=>m.type))];
  $('map-legend').innerHTML = usedTypes.map(t=>`
    <div class="mli"><div class="ld" style="background:${colorMap[t]}"></div>${legendLabels[t]||t}</div>`).join('');

  const container = $('map-wrap');
  const W = container.clientWidth || 800;
  const H = container.clientHeight || 400;
  const svg = d3.select('#map-wrap').append('svg')
    .attr('width','100%').attr('height','100%').attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet').style('display','block');
  svg.append('rect').attr('width',W).attr('height',H).attr('class','map-bg');
  const proj = d3.geoMercator().center(C.mapCenter).scale(W*C.mapScaleMult).translate([W/2,H/2]);
  const pathFn = d3.geoPath(proj);

  const tip = d3.select('body').append('div').attr('class','map-tip')
    .style('position','fixed').style('border-radius','8px')
    .style('padding','8px 12px').style('font-size','12px')
    .style('pointer-events','none').style('opacity',0).style('max-width','220px')
    .style('line-height','1.4').style('z-index',9999).style('font-family',"'Geist',sans-serif");

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
    svg.append('g').selectAll('path')
      .data(topojson.feature(world,world.objects.countries).features)
      .join('path').attr('d',pathFn)
      .attr('class','map-land');

    const isMobile = W <= 600;

    const fontSize = isMobile ? 7 : 9;
    const charW = fontSize * 0.55;
    const labelH = fontSize + 2;
    const pad = 2;

    // seed reserved rects with custom label so marker labels avoid it
    const labels = [];
    if(C.mapLabel){
      const[lx,ly]=proj([C.mapLabel.lon,C.mapLabel.lat]);
      const clFs = isMobile ? 7 : 9;
      const clCharW = clFs * 0.6; // mono font is wider
      C.mapLabel.lines.forEach((line,i)=>{
        const tx = lx-(isMobile?20:32);
        const ty = ly-12+(i*(clFs+1));
        svg.append('text').attr('x',tx).attr('y',ty)
          .attr('font-size',clFs+'px').attr('font-family',"'DM Mono',monospace")
          .attr('font-weight','500').attr('fill',C.mapLabel.color).attr('pointer-events','none')
          .text(line);
        // reserve this rect so marker labels avoid it
        labels.push({ x:tx, y:ty, w:line.length*clCharW, h:clFs+2, ox:tx, oy:ty, text:null });
      });
    }

    // first pass: draw circles and collect label candidates
    C.markers.forEach(m=>{
      const[x,y]=proj([m.lon,m.lat]);
      if(!x||!y)return;
      const col=colorMap[m.type]||'#888';
      svg.append('circle').attr('cx',x).attr('cy',y).attr('r', isMobile ? 4 : 5)
        .attr('class','map-marker').attr('fill',col).attr('fill-opacity',0.85)
        .style('cursor','pointer')
        .on('mouseover',()=>tip.style('opacity',1).html('<strong>'+m.name+'</strong><br>'+m.note))
        .on('mousemove',e=>{
          const tn=tip.node(), tw=tn.offsetWidth, th=tn.offsetHeight;
          const vw=window.innerWidth, vh=window.innerHeight;
          let lx=e.clientX+12, ly=e.clientY-28;
          if(lx+tw>vw-8) lx=e.clientX-tw-12;
          if(ly<8) ly=8;
          if(ly+th>vh-8) ly=vh-th-8;
          tip.style('left',lx+'px').style('top',ly+'px');
        })
        .on('mouseout',()=>tip.style('opacity',0))
        .on('touchstart',function(e){
          e.preventDefault();
          const t=e.touches[0];
          tip.style('opacity',1).html('<strong>'+m.name+'</strong><br>'+m.note);
          requestAnimationFrame(()=>{
            const tn=tip.node(), tw=tn.offsetWidth, th=tn.offsetHeight;
            const vw=window.innerWidth, vh=window.innerHeight;
            let lx=t.clientX+12, ly=t.clientY-28;
            if(lx+tw>vw-8) lx=t.clientX-tw-12;
            if(lx<8) lx=8;
            if(ly<8) ly=8;
            if(ly+th>vh-8) ly=vh-th-8;
            tip.style('left',lx+'px').style('top',ly+'px');
          });
          setTimeout(()=>tip.style('opacity',0),2800);
        });
      let lbl=m.name.split('/')[0].split(' ')[0];
      if(lbl.length>10) lbl=lbl.slice(0,9)+'…';
      const lw = lbl.length * charW;
      // default placement: right of marker
      labels.push({ x:x+7, y:y+Math.round(fontSize*0.45), text:lbl, w:lw, h:labelH, ox:x, oy:y });
    });

    // collision resolution: try alternate placements for overlapping labels
    const placements = [
      (ox,oy,lw)=>({ x:ox+7, y:oy+Math.round(fontSize*0.45) }),                 // right
      (ox,oy,lw)=>({ x:ox-lw-5, y:oy+Math.round(fontSize*0.45) }),              // left
      (ox,oy,lw)=>({ x:ox+7, y:oy-8 }),                                          // top-right
      (ox,oy,lw)=>({ x:ox+7, y:oy+Math.round(fontSize*0.45)+labelH }),           // bottom-right
      (ox,oy,lw)=>({ x:ox-lw-5, y:oy-8 }),                                       // top-left
      (ox,oy,lw)=>({ x:ox-lw-5, y:oy+Math.round(fontSize*0.45)+labelH }),        // bottom-left
    ];

    function rectsOverlap(a,b){
      return a.x < b.x+b.w+pad && a.x+a.w+pad > b.x &&
             a.y-a.h < b.y+pad && a.y+pad > b.y-b.h;
    }

    for(let i=0;i<labels.length;i++){
      if(!labels[i].text) continue; // skip reserved rects
      for(let p=0;p<placements.length;p++){
        const pos = placements[p](labels[i].ox, labels[i].oy, labels[i].w);
        labels[i].x = pos.x;
        labels[i].y = pos.y;
        let collision = false;
        for(let j=0;j<i;j++){
          if(rectsOverlap(labels[i], labels[j])){ collision=true; break; }
        }
        if(!collision) break;
      }
      // clamp label within map bounds
      if(labels[i].x < 2) labels[i].x = 2;
      if(labels[i].x + labels[i].w > W - 2) labels[i].x = W - labels[i].w - 2;
      if(labels[i].y - labels[i].h < 0) labels[i].y = labels[i].h;
      if(labels[i].y > H - 2) labels[i].y = H - 2;
    }

    // draw labels at resolved positions (skip reserved rects from custom label)
    labels.forEach(l=>{
      if(!l.text) return;
      svg.append('text').attr('x',l.x).attr('y',l.y).attr('font-size',fontSize+'px')
        .attr('class','map-label').attr('pointer-events','none')
        .attr('font-family',"'Geist',sans-serif")
        .text(l.text);
    });
  }).catch(()=>{
    svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
      .attr('class','map-err').attr('font-size','13px').text('Map topology could not load');
  });

})();
</script>
</body>
</html>
