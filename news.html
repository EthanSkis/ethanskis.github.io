<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pg-title">News</title>

  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='90' r='54' fill='none' stroke='%23e24b4a' stroke-width='6'/><circle cx='90' cy='90' r='36' fill='none' stroke='%23e24b4a' stroke-width='4'/><circle cx='90' cy='90' r='14' fill='%23e24b4a'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="header.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;transition:background-color 0.4s ease,color 0.4s ease,border-color 0.4s ease,fill 0.4s ease}
:root{
  --bg:#0c0d0f;--surface:#111214;--surface2:#17191c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8e6e1;--muted:#6b6a66;--muted2:#9a9894;
  --red:#e24b4a;--red-dim:rgba(226,75,74,0.12);
  --amber:#ef9f27;--amber-dim:rgba(239,159,39,0.12);
  --blue:#4a9eff;--blue-dim:rgba(74,158,255,0.10);
  --green:#3dba7f;--green-dim:rgba(61,186,127,0.10);
  --purple:#9b8cf7;
  --bar-bg:rgba(12,13,15,0.92);
  --header-accent:#e24b4a;--header-accent-dim:rgba(226,75,74,0.15);
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',monospace;
  --sans:'Geist',system-ui,sans-serif;
}
[data-theme="light"]{
  --bg:#f5f5f0;--surface:#eaeae5;--surface2:#deded9;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.16);
  --text:#1a1a1a;--muted:#7a7a72;--muted2:#5a5a54;
  --red:#c43030;--red-dim:rgba(196,48,48,0.12);
  --amber:#c47f0a;--amber-dim:rgba(196,127,10,0.12);
  --blue:#2a7de0;--blue-dim:rgba(42,125,224,0.10);
  --green:#2a8f5e;--green-dim:rgba(42,143,94,0.10);
  --purple:#7a6ad0;
  --bar-bg:rgba(245,245,240,0.92);
  --header-accent:#c43030;--header-accent-dim:rgba(196,48,48,0.15);
}
html{scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none}html::-webkit-scrollbar{display:none}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
.pill{font-family:var(--mono);font-size:11px;background:var(--red-dim);border:1px solid rgba(226,75,74,.3);color:var(--red);padding:4px 12px;border-radius:20px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.alert{background:var(--red-dim);border-bottom:1px solid rgba(226,75,74,.2);padding:9px 2rem;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--red);font-family:var(--mono);overflow:hidden}
.alert strong{font-weight:500}
#alert-text{}
@keyframes marquee{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}.page{padding:2rem;max-width:1400px;margin:0 auto}
.sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:2rem}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0}
.mc.red::before{background:var(--red)}.mc.amber::before{background:var(--amber)}
.mc.blue::before{background:var(--blue)}.mc.green::before{background:var(--green)}
.mc.neutral::before{background:var(--muted)}
.ml{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.mv{font-family:var(--serif);font-size:26px;line-height:1;color:var(--text);margin-bottom:4px}
.ms{font-size:11px;color:var(--muted2)}.ms.up{color:var(--green)}.ms.dn{color:var(--red)}
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:2rem}
.lc,.rc{display:flex;flex-direction:column;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.ct{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.story{padding:12px 0;border-bottom:1px solid var(--border)}
.story:last-child{border-bottom:none;padding-bottom:0}
.story:first-child{padding-top:0}
.sh{display:flex;align-items:flex-start;gap:9px;margin-bottom:5px}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.d-crit{background:var(--red);box-shadow:0 0 6px rgba(226,75,74,.5)}
.d-high{background:var(--amber)}.d-mod{background:var(--blue)}.d-low{background:var(--green)}
.stitle{font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.sbody{font-size:12px;color:var(--muted2);line-height:1.55;padding-left:16px;margin-top:3px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;padding-left:16px}
.tag{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;letter-spacing:.04em}
.t-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(226,75,74,.2)}
.t-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(239,159,39,.2)}
.t-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(74,158,255,.2)}
.t-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(61,186,127,.2)}
.t-gray{background:var(--surface2);color:var(--muted2);border:1px solid var(--border)}
#map-card{flex:1;display:flex;flex-direction:column}
#map-wrap{width:100%;flex:1;min-height:260px;border-radius:8px;overflow:hidden;position:relative}
.map-bg{fill:#0e1520}
.map-land{fill:#161b24;stroke:rgba(255,255,255,0.08);stroke-width:0.4}
.map-marker{stroke:rgba(255,255,255,0.15);stroke-width:1}
.map-label{fill:rgba(232,230,225,0.65)}
.map-tip{background:#17191c;border:1px solid rgba(255,255,255,0.1);color:#e8e6e1}
.map-err{fill:#6b6a66}
[data-theme="light"] .map-bg{fill:#d8d8d0}
[data-theme="light"] .map-land{fill:#c8c8c0;stroke:rgba(0,0,0,0.12);stroke-width:0.4}
[data-theme="light"] .map-marker{stroke:rgba(0,0,0,0.2);stroke-width:1}
[data-theme="light"] .map-label{fill:rgba(30,30,30,0.6)}
[data-theme="light"] .map-tip{background:#eaeae5;border:1px solid rgba(0,0,0,0.12);color:#1a1a1a}
[data-theme="light"] .map-err{fill:#7a7a72}
.map-leg{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
.mli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2)}
.ld{width:7px;height:7px;border-radius:50%}
.mr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.mr:last-child{border-bottom:none}
.mn{font-size:12px;color:var(--text);flex:1;padding-right:10px;line-height:1.3}
.mright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.bbg{width:52px;height:3px;background:var(--border2);border-radius:3px;overflow:hidden}
.bb{height:3px;border-radius:3px}
.mp{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);min-width:30px;text-align:right}
.md{font-family:var(--mono);font-size:10px;min-width:32px;text-align:right}
.wi{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.5;color:var(--muted2)}
.wi:last-child{border-bottom:none;padding-bottom:0}
.wi:first-child{padding-top:0}
.wic{font-family:var(--mono);font-size:11px;flex-shrink:0;margin-top:1px;font-weight:500}
.wi strong{color:var(--text);font-weight:500}
.ch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.cv{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--red);text-align:right}
.cvs{font-size:10px;color:var(--muted);text-align:right;margin-top:1px}
.cl{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.cli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2)}
.cll{width:20px;height:2px;border-radius:2px}.clv{width:2px;height:12px;border-radius:1px}
#gc-wrap{position:relative;width:100%;height:260px}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:14px}
.stat{background:var(--surface2);border-radius:8px;padding:10px 12px}
.sl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.sv{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text)}
.ss{font-size:10px;color:var(--muted);margin-top:1px}
.hero{padding:2rem 0 1.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.hdate{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px}
.hhed{font-family:var(--serif);font-size:42px;line-height:1.05;color:var(--text);letter-spacing:-.02em}
.hhed em{color:var(--red);font-style:italic}
.hdek{font-size:13px;color:var(--muted2);margin-top:8px;max-width:520px;line-height:1.5}
.hcd{font-family:var(--mono);font-size:12px;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(239,159,39,.25);border-radius:8px;padding:10px 16px;line-height:1.6;text-align:right}
.hcd strong{font-size:22px;display:block;color:var(--red)}
.tleg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.tli{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
footer{border-top:1px solid var(--border);padding:16px 2rem;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 8px;color:var(--muted2)}
/* ── DESKTOP (>600px) ── */
@media(min-width:601px){
  #alert-text{animation:marquee 30s linear infinite;white-space:nowrap}
}

/* ── TABLET (≤900px) ── */
@media(max-width:900px){
  .main-grid{grid-template-columns:1fr}
  .rc{flex-direction:row;flex-wrap:wrap}
  .rc>.card{flex:1;min-width:280px}
  .metrics{grid-template-columns:repeat(3,minmax(0,1fr))}
  .hhed{font-size:34px}
}

/* ── MOBILE (≤600px) ── */
@media(max-width:600px){
  .pill{font-size:9px;padding:3px 8px;letter-spacing:0;white-space:normal}

  /* alert */
  .alert{padding:8px 1rem;font-size:11px}

  /* page padding */
  .page{padding:1rem}

  /* hero — stack, shrink */
  .hero{flex-direction:column;align-items:flex-start;padding:1.25rem 0 1rem}
  .hdate{font-size:10px;letter-spacing:.06em}
  .hhed{font-size:26px;line-height:1.1}
  .hdek{font-size:12px;max-width:100%}
  /* countdown full width on mobile */
  .hcd{width:100%;text-align:left;padding:10px 14px}
  .hcd strong{font-size:18px}

  /* metrics — horizontal scroll row */
  .metrics{
    grid-template-columns:repeat(5,140px);
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:6px;
    margin-bottom:1.25rem;
    gap:8px;
  }
  /* hide scrollbar but keep scroll */
  .metrics::-webkit-scrollbar{display:none}
  .mc{padding:12px 14px}
  .mv{font-size:22px}

  /* main grid — single column */
  .main-grid{grid-template-columns:1fr;gap:12px}
  .rc{flex-direction:column}
  .rc>.card{min-width:0}

  /* card padding */
  .card{padding:14px 16px}

  /* map — shorter on mobile */
  #map-wrap{min-height:200px}

  /* gas chart — hide annotation labels (too cramped), shorter */
  #gc-wrap{height:200px}

  /* gas chart annotations hidden via CSS — Chart.js still renders
     the lines but labels overflow; we clip the canvas overflow */
  #gc-wrap canvas{overflow:hidden}

  /* gas stat cards — 2 columns */
  .stats{grid-template-columns:repeat(2,minmax(0,1fr))}

  /* section label */
  .sec-label{font-size:9px}

  /* story body slightly smaller */
  .sbody{font-size:11px}

  /* polymarket bar narrower */
  .bbg{width:36px}

  /* footer — stack */
  footer{flex-direction:column;align-items:flex-start;padding:12px 1rem;gap:10px}
}

/* ── VERY SMALL (≤380px) ── */
@media(max-width:380px){
  .hhed{font-size:22px}
  .pill{max-width:none;font-size:8px;padding:2px 6px}
  .metrics{grid-template-columns:repeat(5,120px)}
  .nav-links{display:none}
  /* header bar adjustments */
  body > div[style*="display:flex"] {
    padding:0 0.5rem !important;
    gap:6px !important;
    flex-wrap:wrap !important;
    justify-content:flex-start !important;
  }
}
</style>
</head>

</div>

<footer>
  <div style="font-family:var(--mono);letter-spacing:.08em" id="footer-text"></div>
  <div class="chips" id="footer-chips"></div>
</footer>

<script>
const DATA = {

  // ── META ──────────────────────────────────────────────────
  date: "June 20, 2026",
  title: "News — June 20, 2026",
  footerText: "NEWS · June 20, 2026",

  // ── HEADER ────────────────────────────────────────────────

</script>

<!-- ═══════════════════════════ RENDER ENGINE — DO NOT EDIT ═══════════════════════════ -->
<script>
(function(){
  const C = DATA;

  // helpers
  const $ = id => document.getElementById(id);
  const esc = s => s; // content already trusted from DATA

  // meta
  document.title = C.title;
  $('footer-text').textContent = C.footerText;

  // header
  $('hdr-pill').textContent = C.headerPill;

  // alert
  $('alert-text').innerHTML = C.alert;

  // hero
  $('hero-date').textContent = C.heroDate;
  $('hero-hed').innerHTML = C.heroHed;
  $('hero-dek').textContent = C.heroDek;

  // countdown
  if (!C.countdown) {
    $('hero-countdown-wrap').style.display = 'none';
  } else {
    $('countdown-label').textContent = C.countdown.label;
    $('countdown-sub').textContent = C.countdown.sub;
    const target = new Date(C.countdown.target);
    function tick() {
      const diff = target - new Date();
      if (diff <= 0) { $('countdown').textContent = 'EXPIRED'; return; }
      const h = Math.floor(diff/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      $('countdown').textContent = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }
    tick(); setInterval(tick, 1000);
  }

  // metrics
  $('metrics-row').innerHTML = C.metrics.map(m=>`
    <div class="mc ${m.color}">
      <div class="ml">${m.label}</div>
      <div class="mv">${m.value}</div>
      <div class="ms ${m.subClass}">${m.sub}</div>
    </div>`).join('');

  // stories
  $('stories-title').textContent = C.storiesTitle;
  $('stories-list').innerHTML = C.stories.map(s=>`
    <div class="story">
      <div class="sh"><div class="td ${s.dot}"></div><div class="stitle">${s.title}</div></div>
      <div class="sbody">${s.body}</div>
      <div class="tags">${s.tags.map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('')}</div>
    </div>`).join('');

  // polymarket
  $('poly-title').textContent = C.polyTitle;
  $('poly-list').innerHTML = C.poly.map(p=>`
    <div class="mr">
      <div class="mn">${p.name}</div>
      <div class="mright">
        <div class="bbg"><div class="bb" style="width:${p.pct}%;background:${p.barColor}"></div></div>
        <div class="mp">${p.pct}%</div>
        <div class="md" style="color:${p.deltaUp===true?'var(--green)':p.deltaUp===false?'var(--red)':'var(--muted)'}">${p.delta}</div>
      </div>
    </div>`).join('');

  // watch list
  $('watch-list').innerHTML = C.watchItems.map(w=>`
    <div class="wi">
      <span class="wic" style="color:${w.iconColor}">${w.icon}</span>
      <span>${w.text}</span>
    </div>`).join('');

  // threats
  $('threat-list').innerHTML = C.threats.map(t=>`
    <div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="color:var(--text)">${t.name}</span>
        <span style="font-family:var(--mono);color:${t.color};font-size:11px">${t.label}</span>
      </div>
      <div style="background:rgba(255,255,255,.06);height:4px;border-radius:4px;overflow:hidden">
        <div style="width:${t.pct}%;height:100%;background:${t.color};border-radius:4px"></div>
      </div>
    </div>`).join('');

  // gas chart header
  $('gas-title').textContent = C.gasTitle;
  $('gas-sub').textContent   = C.gasSub;
  $('gas-val').textContent   = C.gasCurrentVal;
  $('gas-val-sub').textContent = C.gasCurrentSub;

  // gas stat cards
  $('gas-stats').innerHTML = C.gasStats.map(s=>`
    <div class="stat">
      <div class="sl">${s.label}</div>
      <div class="sv"${s.red?' style="color:var(--red)"':''}>${s.value}</div>
      <div class="ss">${s.sub}</div>
    </div>`).join('');

  // footer sources
  $('footer-chips').innerHTML = C.sources.map(s=>`<span class="chip">${s}</span>`).join('');

  // ── GAS CHART ──────────────────────────────────────────────
  const gLabels = C.gasData.map(d=>d.date);
  const gPrices = C.gasData.map(d=>d.price);
  const splitIdx = C.gasSplitIdx;
  const ptColors = gPrices.map((_,i)=>i>=splitIdx?'#e24b4a':'#4a9eff');

  const isMobile = window.innerWidth <= 600;

  // Assign vertical tiers to avoid label overlap.
  // Threshold 1.4 x-units (~one label width) before reusing a tier; 32px between tiers > 30px label box height.
  const tierLast = [];
  const evTiers = C.gasEvents.map(ev => {
    for (let t = 0; ; t++) {
      if (tierLast[t] === undefined || ev.index - tierLast[t] >= 1.4) {
        tierLast[t] = ev.index;
        return t;
      }
    }
  });

  const annotations = {};
  C.gasEvents.forEach((ev,i)=>{
    annotations['vl'+i] = { type:'line', xMin:ev.index, xMax:ev.index, borderColor:ev.color, borderWidth:1.5, borderDash:[4,3] };
    if(!isMobile) annotations['lb'+i] = {
      type:'label', xValue:ev.index, yValue:C.gasYMax,
      yAdjust: -(20 + evTiers[i] * 32),
      content:ev.label, color:ev.color,
      font:{ size:9, weight:'500', family:"'DM Mono',monospace" },
      textAlign:'center'
    };
  });

  new Chart(document.getElementById('gasChart').getContext('2d'), {
    type:'line',
    data:{ labels:gLabels, datasets:[{
      data:gPrices, borderWidth:2.5,
      pointRadius:gPrices.map((_,i)=>i===0||i===7||i===gPrices.length-1?5:3),
      pointBackgroundColor:ptColors, pointBorderColor:ptColors,
      fill:true,
      backgroundColor:function(c){
        const{ctx:cx,chartArea}=c.chart;
        if(!chartArea)return'transparent';
        const g=cx.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
        g.addColorStop(0,'rgba(226,75,74,0.18)');
        g.addColorStop(0.6,'rgba(74,158,255,0.08)');
        g.addColorStop(1,'rgba(74,158,255,0.01)');
        return g;
      },
      segment:{ borderColor:c=>c.p1DataIndex>=splitIdx?'#e24b4a':'#4a9eff' },
      tension:0.4
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ top: isMobile ? 16 : 110 } },
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            label:v=>' $'+v.parsed.y.toFixed(2)+' / gal',
            afterLabel:v=>v.dataIndex>=splitIdx?'  ⚠ disruption period':''
          },
          backgroundColor:'#17191c', titleColor:'#e8e6e1', bodyColor:'#9a9894',
          borderColor:'rgba(255,255,255,0.1)', borderWidth:1, padding:10
        },
        annotation:{ annotations }
      },
      scales:{
        x:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{ color:'#6b6a66', font:{size:10}, maxRotation:45, autoSkip:false, callback:function(v,i){return isMobile ? (i%4===0?this.getLabelForValue(v):'') : (i%2===0?this.getLabelForValue(v):'')} } },
        y:{ min:C.gasYMin, max:C.gasYMax, grid:{color:'rgba(255,255,255,0.05)'}, ticks:{ color:'#6b6a66', font:{size:10}, callback:v=>'$'+v.toFixed(2) } }
      }
    }
  });

  // ── MAP ────────────────────────────────────────────────────
  const colorMap = { strike:'#e24b4a', airdef:'#ef9f27', naval:'#4a9eff', actor:'#9b8cf7', diplo:'#3dba7f' };
  const legendLabels = { strike:'strikes / hit', airdef:'air defenses active', naval:'US naval assets', actor:'other actors', diplo:'ceasefire mediators' };

  $('map-title').textContent = C.mapTitle;

  // legend — only show types that exist in markers
  const usedTypes = [...new Set(C.markers.map(m=>m.type))];
  $('map-legend').innerHTML = usedTypes.map(t=>`
    <div class="mli"><div class="ld" style="background:${colorMap[t]}"></div>${legendLabels[t]||t}</div>`).join('');

  const container = $('map-wrap');
  const W = container.clientWidth || 800;
  const H = container.clientHeight || 400;
  const svg = d3.select('#map-wrap').append('svg')
    .attr('width','100%').attr('height','100%').attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet').style('display','block');
  svg.append('rect').attr('width',W).attr('height',H).attr('class','map-bg');
  const proj = d3.geoMercator().center(C.mapCenter).scale(W*C.mapScaleMult).translate([W/2,H/2]);
  const pathFn = d3.geoPath(proj);

  const tip = d3.select('body').append('div').attr('class','map-tip')
    .style('position','fixed').style('border-radius','8px')
    .style('padding','8px 12px').style('font-size','12px')
    .style('pointer-events','none').style('opacity',0).style('max-width','220px')
    .style('line-height','1.4').style('z-index',9999).style('font-family',"'Geist',sans-serif");

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
    svg.append('g').selectAll('path')
      .data(topojson.feature(world,world.objects.countries).features)
      .join('path').attr('d',pathFn)
      .attr('class','map-land');

    const isMobile = W <= 600;

    const fontSize = isMobile ? 7 : 9;
    const charW = fontSize * 0.55;
    const labelH = fontSize + 2;
    const pad = 2;

    // seed reserved rects with custom label so marker labels avoid it
    const labels = [];
    if(C.mapLabel){
      const[lx,ly]=proj([C.mapLabel.lon,C.mapLabel.lat]);
      const clFs = isMobile ? 7 : 9;
      const clCharW = clFs * 0.6; // mono font is wider
      C.mapLabel.lines.forEach((line,i)=>{
        const tx = lx-(isMobile?20:32);
        const ty = ly-12+(i*(clFs+1));
        svg.append('text').attr('x',tx).attr('y',ty)
          .attr('font-size',clFs+'px').attr('font-family',"'DM Mono',monospace")
          .attr('font-weight','500').attr('fill',C.mapLabel.color).attr('pointer-events','none')
          .text(line);
        // reserve this rect so marker labels avoid it
        labels.push({ x:tx, y:ty, w:line.length*clCharW, h:clFs+2, ox:tx, oy:ty, text:null });
      });
    }

    // first pass: draw circles and collect label candidates
    C.markers.forEach(m=>{
      const[x,y]=proj([m.lon,m.lat]);
      if(!x||!y)return;
      const col=colorMap[m.type]||'#888';
      svg.append('circle').attr('cx',x).attr('cy',y).attr('r', isMobile ? 4 : 5)
        .attr('class','map-marker').attr('fill',col).attr('fill-opacity',0.85)
        .style('cursor','pointer')
        .on('mouseover',()=>tip.style('opacity',1).html('<strong>'+m.name+'</strong><br>'+m.note))
        .on('mousemove',e=>{
          const tn=tip.node(), tw=tn.offsetWidth, th=tn.offsetHeight;
          const vw=window.innerWidth, vh=window.innerHeight;
          let lx=e.clientX+12, ly=e.clientY-28;
          if(lx+tw>vw-8) lx=e.clientX-tw-12;
          if(ly<8) ly=8;
          if(ly+th>vh-8) ly=vh-th-8;
          tip.style('left',lx+'px').style('top',ly+'px');
        })
        .on('mouseout',()=>tip.style('opacity',0))
        .on('touchstart',function(e){
          e.preventDefault();
          const t=e.touches[0];
          tip.style('opacity',1).html('<strong>'+m.name+'</strong><br>'+m.note);
          requestAnimationFrame(()=>{
            const tn=tip.node(), tw=tn.offsetWidth, th=tn.offsetHeight;
            const vw=window.innerWidth, vh=window.innerHeight;
            let lx=t.clientX+12, ly=t.clientY-28;
            if(lx+tw>vw-8) lx=t.clientX-tw-12;
            if(lx<8) lx=8;
            if(ly<8) ly=8;
            if(ly+th>vh-8) ly=vh-th-8;
            tip.style('left',lx+'px').style('top',ly+'px');
          });
          setTimeout(()=>tip.style('opacity',0),2800);
        });
      let lbl=m.name.split('/')[0].split(' ')[0];
      if(lbl.length>10) lbl=lbl.slice(0,9)+'…';
      const lw = lbl.length * charW;
      // default placement: right of marker
      labels.push({ x:x+7, y:y+Math.round(fontSize*0.45), text:lbl, w:lw, h:labelH, ox:x, oy:y });
    });

    // collision resolution: try alternate placements for overlapping labels
    const placements = [
      (ox,oy,lw)=>({ x:ox+7, y:oy+Math.round(fontSize*0.45) }),                 // right
      (ox,oy,lw)=>({ x:ox-lw-5, y:oy+Math.round(fontSize*0.45) }),              // left
      (ox,oy,lw)=>({ x:ox+7, y:oy-8 }),                                          // top-right
      (ox,oy,lw)=>({ x:ox+7, y:oy+Math.round(fontSize*0.45)+labelH }),           // bottom-right
      (ox,oy,lw)=>({ x:ox-lw-5, y:oy-8 }),                                       // top-left
      (ox,oy,lw)=>({ x:ox-lw-5, y:oy+Math.round(fontSize*0.45)+labelH }),        // bottom-left
    ];

    function rectsOverlap(a,b){
      return a.x < b.x+b.w+pad && a.x+a.w+pad > b.x &&
             a.y-a.h < b.y+pad && a.y+pad > b.y-b.h;
    }

    for(let i=0;i<labels.length;i++){
      if(!labels[i].text) continue; // skip reserved rects
      for(let p=0;p<placements.length;p++){
        const pos = placements[p](labels[i].ox, labels[i].oy, labels[i].w);
        labels[i].x = pos.x;
        labels[i].y = pos.y;
        let collision = false;
        for(let j=0;j<i;j++){
          if(rectsOverlap(labels[i], labels[j])){ collision=true; break; }
        }
        if(!collision) break;
      }
      // clamp label within map bounds
      if(labels[i].x < 2) labels[i].x = 2;
      if(labels[i].x + labels[i].w > W - 2) labels[i].x = W - labels[i].w - 2;
      if(labels[i].y - labels[i].h < 0) labels[i].y = labels[i].h;
      if(labels[i].y > H - 2) labels[i].y = H - 2;
    }

    // draw labels at resolved positions (skip reserved rects from custom label)
    labels.forEach(l=>{
      if(!l.text) return;
      svg.append('text').attr('x',l.x).attr('y',l.y).attr('font-size',fontSize+'px')
        .attr('class','map-label').attr('pointer-events','none')
        .attr('font-family',"'Geist',sans-serif")
        .text(l.text);
    });
  }).catch(()=>{
    svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
      .attr('class','map-err').attr('font-size','13px').text('Map topology could not load');
  });

})();
</script>
