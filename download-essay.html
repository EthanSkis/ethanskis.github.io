<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Essay Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #4caf50;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Stock Market Essay</h1>
        <p>Your download is starting...</p>
        <div class="spinner"></div>
        <p class="success" id="successMsg" style="display: none;">✓ Download started! If it didn't start, <a href="StockMarketEssay.docx" download>click here</a>.</p>
    </div>

    <script>
        // Function to trigger download
        function downloadFile() {
            const link = document.createElement('a');
            link.href = 'StockMarketEssay.docx';
            link.download = 'StockMarketEssay.docx';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Show success message after a short delay
            setTimeout(() => {
                document.querySelector('p').style.display = 'none';
                document.querySelector('.spinner').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            }, 1000);
        }

        // Trigger download on page load
        window.addEventListener('load', downloadFile);
    </script>
</body>
</html>
