<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HTML Editor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M 25 35 L 35 25 L 35 50 M 65 35 L 75 25 L 75 50' stroke='%234a9eff' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><line x1='42' y1='30' x2='58' y2='45' stroke='%234a9eff' stroke-width='2' stroke-linecap='round'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><path d='M 45 63 L 63 45 L 63 90 M 117 63 L 135 45 L 135 90' stroke='%234a9eff' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><line x1='76' y1='54' x2='104' y2='81' stroke='%234a9eff' stroke-width='4' stroke-linecap='round'/></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="header.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;transition:background-color 0.4s ease,color 0.4s ease,border-color 0.4s ease,fill 0.4s ease}
  :root{
    --bg:#0c0d0f;--surface:#111214;--surface2:#17191c;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --text:#e8e6e1;--muted:#6b6a66;--muted2:#9a9894;
    --red:#e24b4a;--amber:#ef9f27;--blue:#4a9eff;--purple:#9b8cf7;
    --turquoise:#2dd4bf;
    --bar-bg:rgba(12,13,15,0.92);
    --header-accent:var(--turquoise);--header-accent-dim:rgba(45,212,191,0.15);
    --serif:'Instrument Serif',Georgia,serif;
    --mono:'DM Mono',monospace;
    --sans:'Geist',system-ui,sans-serif;
  }
  [data-theme="light"]{
    --bg:#f5f5f0;--surface:#eaeae5;--surface2:#deded9;
    --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.16);
    --text:#1a1a1a;--muted:#7a7a72;--muted2:#5a5a54;
    --red:#c43030;--amber:#c47f0a;--blue:#2a7de0;--purple:#7a6ad0;
    --turquoise:#0d9488;
    --bar-bg:rgba(245,245,240,0.92);
  }
  body{
    font-family:var(--sans);background:var(--bg);color:var(--text);
    height:100dvh;overflow:hidden;display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  .cursor-glow{display:none}
  .tabs{
    display:flex;gap:2px;background:var(--surface);
    border:1px solid var(--border);border-radius:8px;padding:3px;
  }
  .tab{
    padding:4px 12px;border:none;border-radius:5px;
    background:transparent;color:var(--muted);
    font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.06em;
    cursor:pointer;transition:all 0.15s;
  }
  .tab:hover{color:var(--muted2)}
  .tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
  .spacer{flex:1}
  .actions{display:flex;align-items:center;gap:8px}
  .auto-label{
    display:flex;align-items:center;gap:7px;
    font-family:var(--mono);font-size:10px;letter-spacing:0.04em;
    color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;
  }
  .toggle{position:relative;width:30px;height:16px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0;position:absolute}
  .toggle-track{
    position:absolute;inset:0;background:var(--surface2);
    border-radius:8px;border:1px solid var(--border2);
    cursor:pointer;transition:background 0.2s;
  }
  .toggle-track::after{
    content:'';position:absolute;top:2px;left:2px;
    width:10px;height:10px;border-radius:50%;
    background:var(--muted);transition:transform 0.2s,background 0.2s;
  }
  .toggle input:checked+.toggle-track{background:rgba(155,140,247,0.3);border-color:rgba(155,140,247,0.5)}
  .toggle input:checked+.toggle-track::after{transform:translateX(14px);background:var(--purple)}
  .btn{
    display:flex;align-items:center;gap:5px;padding:4px 11px;
    border:1px solid var(--border2);border-radius:6px;
    background:var(--surface);color:var(--muted2);
    font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.04em;
    cursor:pointer;transition:all 0.15s;white-space:nowrap;
  }
  .btn:hover{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,0.18)}
  .btn-run{background:rgba(155,140,247,0.12);border-color:rgba(155,140,247,0.3);color:var(--purple)}
  .btn-run:hover{background:rgba(155,140,247,0.22);border-color:rgba(155,140,247,0.5);color:#c4b8ff}
  /* ── Split ── */
  .split{position:relative;z-index:1;display:flex;flex:1;overflow:hidden}
  /* ── Editor pane ── */
  .editor-pane{width:50%;min-width:120px;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
  .editor-wrap{display:none;flex:1;overflow:hidden}
  .editor-wrap.active{display:flex;flex-direction:column}
  .editor-wrap .CodeMirror{
    flex:1;height:100%;font-size:13px;line-height:1.65;
    font-family:var(--mono);background:#0c0d0f !important;color:#e8e6e1 !important;
  }
  .editor-wrap .CodeMirror-scroll{height:100%}
  .editor-wrap .CodeMirror-gutters{background:#0c0d0f !important;border-right:1px solid var(--border) !important}
  [data-theme="light"] .editor-wrap .CodeMirror{
    background:#f5f5f0 !important;color:#1a1a1a !important;
  }
  [data-theme="light"] .editor-wrap .CodeMirror-gutters{background:#f5f5f0 !important}
  /* ── Divider ── */
  .divider{
    width:4px;background:var(--border);
    border-left:1px solid var(--surface2);border-right:1px solid var(--surface2);
    cursor:col-resize;flex-shrink:0;transition:background 0.15s;z-index:5;
  }
  .divider:hover,.divider.dragging{background:rgba(155,140,247,0.25)}
  /* ── Preview pane ── */
  .preview-pane{flex:1;min-width:120px;display:flex;flex-direction:column;overflow:hidden}
  #preview{flex:1;border:none;background:#fff}
  /* ── Console ── */
  .console{
    flex-shrink:0;max-height:140px;min-height:28px;
    display:flex;flex-direction:column;
    background:var(--surface);border-top:1px solid var(--border);
  }
  .console-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:5px 12px;
    font-family:var(--mono);font-size:9px;font-weight:500;
    letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;
    cursor:pointer;user-select:none;flex-shrink:0;
    border-bottom:1px solid var(--border);
  }
  .console-header:hover{color:var(--muted2)}
  .console-output{flex:1;overflow-y:auto;padding:4px 0;font-family:var(--mono);font-size:11px}
  .console-output:empty::before{
    content:'No output yet.';display:block;padding:4px 12px;
    color:var(--muted);font-style:italic;
  }
  .console-entry{padding:2px 12px;line-height:1.5;word-break:break-all;border-bottom:1px solid var(--border)}
  .console-entry.log{color:var(--muted2)}
  .console-entry.info{color:var(--blue)}
  .console-entry.warn{color:var(--amber);background:rgba(239,159,39,0.06)}
  .console-entry.error{color:var(--red);background:rgba(226,75,74,0.06)}
  /* ── Mobile ── */
  @media(max-width:600px){
    .editor-wrap .CodeMirror{font-size:16px}
  }
  @media(max-width:735px){
    .split{flex-direction:column}
    .editor-pane{width:100% !important;height:45%;min-width:unset;flex-shrink:0}
    .divider{width:100%;height:4px;cursor:row-resize;border-left:none;border-right:none;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .preview-pane{flex:1;min-width:unset}
    .auto-label span{display:none}
  }
  @media(max-width:480px){
    .btn{padding:4px 8px}
    .tab{padding:4px 8px}
  }
</style>
</head>
<body>

<div class="cursor-glow" id="cursorGlow"></div>

<header>
  <div class="wm"><div class="dot"></div>EDITOR</div>
  <div class="hdr-r">
    <nav class="hdr-nav">
      <a href="/" class="nav-link">Portfolio</a>
      <a href="/news" class="nav-link">News</a>
      <a href="/notes" class="nav-link">Notes</a>
      <a href="/snake" class="nav-link">Snake</a>
      <a href="/html" class="nav-link active">Editor</a>
      <a href="/ai" class="nav-link">AI</a>
    </nav>
    <button id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀</button>
    <div style="position:relative;display:inline-flex">
      <button class="menu-btn" onclick="toggleMenu(event)" title="Menu">
        <div class="menu-bar"></div>
        <div class="menu-bar"></div>
        <div class="menu-bar"></div>
      </button>
      <nav class="nav-menu" id="navMenu">
        <a href="/" class="nav-link">Portfolio</a>
        <a href="/news" class="nav-link">News</a>
        <a href="/notes" class="nav-link">Notes</a>
        <a href="/snake" class="nav-link">Snake</a>
        <a href="/html" class="nav-link active">Editor</a>
        <a href="/ai" class="nav-link">AI</a>
      </nav>
    </div>
  </div>
</header>
<script src="header.js"></script>

<div style="display:flex;align-items:center;gap:12px;padding:0 2rem;height:48px;background:var(--bar-bg);border-bottom:1px solid var(--border);flex-shrink:0">
  <div class="tabs">
    <button class="tab active" data-lang="html">HTML</button>
    <button class="tab" data-lang="css">CSS</button>
    <button class="tab" data-lang="js">JS</button>
  </div>

  <div class="spacer"></div>

  <div class="actions">
    <label class="auto-label">
      <div class="toggle">
        <input type="checkbox" id="autoRun" checked>
        <div class="toggle-track"></div>
      </div>
      <span>Auto-run</span>
    </label>
    <button class="btn btn-run" id="runBtn">&#9654; Run</button>
    <button class="btn" id="dlBtn">&#8595; Export</button>
  </div>
</div>

<!-- Main split pane -->
<div class="split" id="split">

  <!-- Editor pane -->
  <div class="editor-pane" id="editorPane">
    <div class="editor-wrap active" id="wrap-html">
      <textarea id="cm-html"></textarea>
    </div>
    <div class="editor-wrap" id="wrap-css">
      <textarea id="cm-css"></textarea>
    </div>
    <div class="editor-wrap" id="wrap-js">
      <textarea id="cm-js"></textarea>
    </div>
  </div>

  <!-- Drag divider -->
  <div class="divider" id="divider"></div>

  <!-- Preview pane -->
  <div class="preview-pane" id="previewPane">
    <iframe id="preview" sandbox="allow-scripts allow-modals"></iframe>
    <div class="console" id="consolePanel">
      <div class="console-header" id="consoleToggle">
        Console
        <span id="consoleCount"></span>
      </div>
      <div class="console-output" id="consoleOutput"></div>
    </div>
  </div>

</div>

<!-- CodeMirror -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

<script>
document.addEventListener('themechange', function(e) {
  if (window.editors) {
    var newTheme = e.detail.theme === 'light' ? 'eclipse' : 'dracula';
    Object.values(window.editors).forEach(function(ed) { ed.setOption('theme', newTheme); });
  }
});

(function () {
  // ── Starter code ────────────────────────────────────────
  const STARTER_HTML = `<h1>Hello, World!</h1>
<p>Edit the <strong>HTML</strong>, <strong>CSS</strong>, and <strong>JS</strong> tabs — the preview updates live.</p>
<button onclick="greet()">Click me</button>`;

  const STARTER_CSS = `body {
  font-family: system-ui, sans-serif;
  background: #0d0d1a;
  color: #f0eeff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 18px;
  margin: 0;
}

h1 {
  font-size: 2.2rem;
  color: #a78bfa;
  letter-spacing: -0.5px;
}

p { color: rgba(240, 238, 255, 0.65); max-width: 360px; text-align: center; }

button {
  padding: 10px 28px;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 600;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

button:hover { opacity: 0.85; transform: translateY(-1px); }
button:active { transform: translateY(0); }`;

  const STARTER_JS = `function greet() {
  const names = ['World', 'Developer', 'Creator', 'Builder'];
  const name = names[Math.floor(Math.random() * names.length)];
  document.querySelector('h1').textContent = \`Hello, \${name}!\`;
  console.log('Greeted:', name);
}`;

  // ── CodeMirror instances ─────────────────────────────────
  const getTheme = () => {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    return isDark ? 'dracula' : 'eclipse';
  };
  const cmOpts = (mode, value) => ({
    mode,
    theme: getTheme(),
    lineNumbers: true,
    tabSize: 2,
    indentWithTabs: false,
    lineWrapping: false,
    autoCloseBrackets: true,
    matchBrackets: true,
    value,
  });

  const editors = window.editors = {
    html: CodeMirror.fromTextArea(document.getElementById('cm-html'), cmOpts('htmlmixed', STARTER_HTML)),
    css:  CodeMirror.fromTextArea(document.getElementById('cm-css'),  cmOpts('css', STARTER_CSS)),
    js:   CodeMirror.fromTextArea(document.getElementById('cm-js'),   cmOpts('javascript', STARTER_JS)),
  };

  // ── Tab switching ────────────────────────────────────────
  let activeTab = 'html';

  function setActiveTab(lang) {
    activeTab = lang;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
    ['html', 'css', 'js'].forEach(l => {
      document.getElementById('wrap-' + l).classList.toggle('active', l === lang);
    });
    editors[lang].refresh();
  }

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => setActiveTab(btn.dataset.lang));
  });

  // ── Compile / preview ────────────────────────────────────
  const preview = document.getElementById('preview');

  function buildDoc() {
    const html = editors.html.getValue();
    const css  = editors.css.getValue();
    const js   = editors.js.getValue();
    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>${css}</style>
</head>
<body>
${html}
<script>
(function(){
  var _oe = window.onerror;
  window.onerror = function(msg, src, line, col, err) {
    parent.postMessage({_cm:'error', msg: String(msg), line: line, col: col}, '*');
    return true;
  };
  ['log','warn','error','info'].forEach(function(m){
    var orig = console[m].bind(console);
    console[m] = function(){
      var args = Array.prototype.slice.call(arguments);
      parent.postMessage({_cm: m, msg: args.map(function(a){ return typeof a === 'object' ? JSON.stringify(a) : String(a); }).join(' ')}, '*');
      orig.apply(console, args);
    };
  });
})();
<\/script>
<script>
${js}
<\/script>
</body>
</html>`;
  }

  function compile() {
    clearConsole();
    preview.srcdoc = buildDoc();
  }

  // ── Auto-run debounce ────────────────────────────────────
  let debounceTimer = null;
  const autoRunToggle = document.getElementById('autoRun');

  function scheduleRun() {
    if (!autoRunToggle.checked) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(compile, 500);
  }

  Object.values(editors).forEach(ed => ed.on('change', scheduleRun));

  document.getElementById('runBtn').addEventListener('click', compile);

  // ── Console ──────────────────────────────────────────────
  const consoleOutput = document.getElementById('consoleOutput');
  const consoleCount  = document.getElementById('consoleCount');
  let errorCount = 0;

  function clearConsole() {
    consoleOutput.innerHTML = '';
    errorCount = 0;
    consoleCount.textContent = '';
  }

  window.addEventListener('message', function (e) {
    if (!e.data || !e.data._cm) return;
    const { _cm, msg, line, col } = e.data;
    const entry = document.createElement('div');
    entry.className = 'console-entry ' + _cm;
    let text = msg;
    if (_cm === 'error' && line !== undefined) text += `  (line ${line})`;
    entry.textContent = text;
    consoleOutput.appendChild(entry);
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
    if (_cm === 'error' || _cm === 'warn') {
      errorCount++;
      consoleCount.textContent = ` (${errorCount})`;
    }
  });

  // Toggle console height
  let consoleExpanded = true;
  document.getElementById('consoleToggle').addEventListener('click', function () {
    consoleExpanded = !consoleExpanded;
    consoleOutput.style.display = consoleExpanded ? '' : 'none';
  });

  // ── Download ─────────────────────────────────────────────
  document.getElementById('dlBtn').addEventListener('click', function () {
    const blob = new Blob([buildDoc()], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 60000);
  });

  // ── Draggable split pane ─────────────────────────────────
  const divider    = document.getElementById('divider');
  const editorPane = document.getElementById('editorPane');
  const previewPane = document.getElementById('previewPane');
  const splitEl    = document.getElementById('split');
  let dragging = false;
  const isMobile = () => window.innerWidth <= 735;

  divider.addEventListener('mousedown', function (e) {
    e.preventDefault();
    dragging = true;
    divider.classList.add('dragging');
    // Disable iframe pointer events during drag
    preview.style.pointerEvents = 'none';
  });

  window.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    const rect = splitEl.getBoundingClientRect();
    if (isMobile()) {
      const pct = Math.min(Math.max(((e.clientY - rect.top) / rect.height) * 100, 15), 80);
      editorPane.style.height = pct + '%';
    } else {
      const pct = Math.min(Math.max(((e.clientX - rect.left) / rect.width) * 100, 15), 80);
      editorPane.style.width = pct + '%';
    }
    Object.values(editors).forEach(ed => ed.refresh());
  });

  window.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    preview.style.pointerEvents = '';
  });

  // Touch drag support
  divider.addEventListener('touchstart', function (e) {
    dragging = true;
    divider.classList.add('dragging');
    preview.style.pointerEvents = 'none';
  }, { passive: true });

  window.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    const touch = e.touches[0];
    const rect = splitEl.getBoundingClientRect();
    if (isMobile()) {
      const pct = Math.min(Math.max(((touch.clientY - rect.top) / rect.height) * 100, 15), 80);
      editorPane.style.height = pct + '%';
    } else {
      const pct = Math.min(Math.max(((touch.clientX - rect.left) / rect.width) * 100, 15), 80);
      editorPane.style.width = pct + '%';
    }
    Object.values(editors).forEach(ed => ed.refresh());
  }, { passive: true });

  window.addEventListener('touchend', function () {
    dragging = false;
    divider.classList.remove('dragging');
    preview.style.pointerEvents = '';
  });

  // ── Cursor glow ──────────────────────────────────────────
  const glow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', function (e) {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });

  // ── Initial compile ──────────────────────────────────────
  compile();

})();
</script>
</body>
</html>
