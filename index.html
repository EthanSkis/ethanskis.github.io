<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1c1c1e">
<title>Ethan Gardner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='6' fill='%23ffffff'/></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1c1c1e;
  --dot:#ffffff;
  --gap:22px;
  --ox:0px;
  --oy:0px;
}
html,body{height:100%;background:var(--bg);overscroll-behavior:none}
body{
  min-height:100svh;
  min-height:100dvh;
  overflow:hidden;
  position:fixed;
  inset:0;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  cursor:grab;
}
body.dragging{cursor:grabbing}
.grid{
  position:fixed;
  inset:0;
  background-color:var(--bg);
  background-image:radial-gradient(circle,var(--dot) 1px,transparent 1.4px);
  background-size:var(--gap) var(--gap);
  background-position:calc(50% + var(--ox)) calc(50% + var(--oy));
  will-change:background-position;
}
</style>
</head>
<body>
  <div class="grid" id="grid"></div>
<script>
(() => {
  const body = document.body;
  let ox = 0, oy = 0;
  let vx = 0, vy = 0;
  let lastX = 0, lastY = 0;
  let lastT = 0;
  let dragging = false;
  let pointerId = null;
  let raf = null;

  const apply = () => {
    body.style.setProperty('--ox', ox + 'px');
    body.style.setProperty('--oy', oy + 'px');
  };

  const tick = () => {
    if (dragging) { raf = null; return; }
    vx *= 0.94;
    vy *= 0.94;
    ox += vx;
    oy += vy;
    apply();
    if (Math.abs(vx) > 0.05 || Math.abs(vy) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      raf = null;
    }
  };

  const onDown = (e) => {
    dragging = true;
    pointerId = e.pointerId;
    body.classList.add('dragging');
    body.setPointerCapture(e.pointerId);
    lastX = e.clientX;
    lastY = e.clientY;
    lastT = performance.now();
    vx = 0; vy = 0;
    if (raf) { cancelAnimationFrame(raf); raf = null; }
  };

  const SENS = 0.25;

  const onMove = (e) => {
    if (!dragging || e.pointerId !== pointerId) return;
    const now = performance.now();
    const dx = (e.clientX - lastX) * SENS;
    const dy = (e.clientY - lastY) * SENS;
    const dt = Math.max(1, now - lastT);
    ox += dx;
    oy += dy;
    vx = dx / dt * 16;
    vy = dy / dt * 16;
    lastX = e.clientX;
    lastY = e.clientY;
    lastT = now;
    apply();
  };

  const onUp = (e) => {
    if (e.pointerId !== pointerId) return;
    dragging = false;
    pointerId = null;
    body.classList.remove('dragging');
    if (!raf) raf = requestAnimationFrame(tick);
  };

  body.addEventListener('pointerdown', onDown);
  body.addEventListener('pointermove', onMove);
  body.addEventListener('pointerup', onUp);
  body.addEventListener('pointercancel', onUp);
  body.addEventListener('contextmenu', (e) => e.preventDefault());
  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    ox -= e.deltaX * SENS;
    oy -= e.deltaY * SENS;
    apply();
  }, { passive: false });
})();
</script>
</body>
</html>
