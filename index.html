<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ethan Gardner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fbfbfd;
      color: #1d1d1f;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120, 180, 255, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(200, 160, 255, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(255, 160, 200, 0.10) 0%, transparent 50%);
      animation: drift 20s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes drift {
      0%   { transform: scale(1) translate(0, 0); }
      33%  { transform: scale(1.1) translate(-3%, 4%); }
      66%  { transform: scale(0.95) translate(4%, -3%); }
      100% { transform: scale(1.05) translate(-2%, 2%); }
    }

    h1 {
      position: relative;
      z-index: 1;
      font-size: 80px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.05;
      text-align: center;
      padding: 0 24px;
    }

    @media (max-width: 1068px) {
      h1 { font-size: 64px; }
    }

    @media (max-width: 735px) {
      h1 { font-size: 44px; }
    }
  </style>
</head>
<body>
  <h1>Ethan Gardner</h1>
</body>
</html>
