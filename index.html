<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0907">
<title>Ethan Gardner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='6' fill='%23c9a96a'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0907;
  --gold:#c9a96a;
  --gold-bright:#e8cc8a;
  --gold-deep:#8a7340;
  --dot:rgba(201,169,106,0.26);
  --ink:#ece4d2;
  --gap:22px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:'Geist',system-ui,-apple-system,sans-serif;
  min-height:100svh;
  min-height:100dvh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  background-color:var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 50%,rgba(201,169,106,0.10),transparent 65%),
    radial-gradient(circle,var(--dot) 1px,transparent 1.4px);
  background-size:auto,var(--gap) var(--gap);
  background-position:center,center;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:radial-gradient(120% 80% at 50% 50%,transparent 55%,rgba(0,0,0,0.55) 100%);
}
.stage{position:relative;z-index:1;padding:0 24px}
.name{
  font-family:'Geist',system-ui,sans-serif;
  font-weight:400;
  font-size:18px;
  letter-spacing:0.04em;
  color:var(--ink);
  opacity:0.85;
  margin-bottom:18px;
}
.figure{
  font-family:'Geist',system-ui,sans-serif;
  font-weight:500;
  font-size:clamp(78px,23vw,134px);
  line-height:0.95;
  letter-spacing:-0.045em;
  background:linear-gradient(180deg,var(--gold-bright) 0%,var(--gold) 45%,var(--gold-deep) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
  filter:drop-shadow(0 6px 22px rgba(201,169,106,0.18));
}
.figure .currency{
  font-size:0.55em;
  vertical-align:0.42em;
  margin-right:0.04em;
  font-weight:400;
  opacity:0.85;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="name">Ethan Gardner</div>
    <div class="figure"><span class="currency">$</span>1,336</div>
  </div>
</body>
</html>
