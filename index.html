<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ethgrd</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80' fill='white'>🌐</text></svg>">
  <style>
    :root {
      --amb1: 80, 140, 255; --amb1a: 0.28;
      --amb2: 170, 120, 255; --amb2a: 0.22;
      --amb3: 255, 120, 180; --amb3a: 0.18;
      --glow: 160, 140, 255; --glowa: 0.18;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      cursor: none;
    }

    body.modal-open {
      cursor: auto;
    }

    body.modal-open .modal-close,
    body.modal-open .modal-submit {
      cursor: pointer;
    }

    /* ── Ambient gradient ── */
    body::before {
      content: '';
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(ellipse at 25% 50%, rgba(var(--amb1), var(--amb1a)) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 20%, rgba(var(--amb2), var(--amb2a)) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 85%, rgba(var(--amb3), var(--amb3a)) 0%, transparent 55%);
      animation: drift 18s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes drift {
      0%   { transform: scale(1) translate(0, 0) rotate(0deg); }
      25%  { transform: scale(1.12) translate(-4%, 5%) rotate(1deg); }
      50%  { transform: scale(0.94) translate(5%, -3%) rotate(-1deg); }
      75%  { transform: scale(1.08) translate(-2%, -4%) rotate(0.5deg); }
      100% { transform: scale(1.03) translate(3%, 2%) rotate(-0.5deg); }
    }

    /* ── Cursor glow ── */
    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--glow), var(--glowa)) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
      opacity: 0;
      mix-blend-mode: screen;
    }

    .cursor-glow.visible {
      opacity: 1;
    }

    /* ── Center content ── */
    .center {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      perspective: 800px;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 80px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.05;
      transition: transform 0.15s ease-out;
      will-change: transform;
    }


    /* ── Subtitle row ── */
    .subtitle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: rgba(245, 245, 247, 0.35);
      font-variant-numeric: tabular-nums;
    }

    .subtitle .sep {
      color: rgba(245, 245, 247, 0.15);
    }

    @media (max-width: 1068px) {
      h1 { font-size: 64px; }
      .subtitle { font-size: 14px; margin-top: 12px; }
    }

    /* ── Inquiry button ── */
    .inquire-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(245, 245, 247, 0.75);
      border: 1px solid rgba(245, 245, 247, 0.18);
      border-radius: 980px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: none;
      text-decoration: none;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .inquire-btn:hover {
      color: rgba(245, 245, 247, 1);
      border-color: rgba(245, 245, 247, 0.4);
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: rgba(20, 20, 22, 0.85);
      border: 1px solid rgba(245, 245, 247, 0.1);
      border-radius: 20px;
      padding: 36px 32px 32px;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(245, 245, 247, 0.5);
      font-size: 16px;
      line-height: 1;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.14);
      color: rgba(245, 245, 247, 0.9);
    }

    .modal h2 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .modal p {
      font-size: 13px;
      color: rgba(245, 245, 247, 0.4);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(245, 245, 247, 0.4);
    }

    .field input,
    .field textarea,
    .field select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(245, 245, 247, 0.1);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: #f5f5f7;
      outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
      width: 100%;
      -webkit-appearance: none;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: rgba(245, 245, 247, 0.2);
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: rgba(245, 245, 247, 0.3);
      background: rgba(255, 255, 255, 0.08);
    }

    .field textarea {
      resize: none;
      height: 88px;
      line-height: 1.5;
    }

    /* ── Custom dropdown ── */
    .dropdown-wrapper {
      position: relative;
      width: 100%;
    }

    .dropdown-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: rgba(255, 255, 255, 0.05);
      padding-right: 32px;
    }

    .dropdown-select::after {
      content: '▼';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: rgba(245, 245, 247, 0.5);
      font-size: 10px;
      opacity: 0.7;
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 4px;
      background: rgba(20, 20, 22, 0.95);
      border: 1px solid rgba(245, 245, 247, 0.15);
      border-radius: 10px;
      overflow: hidden;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px) scale(0.95);
      transition: opacity 0.15s ease, visibility 0.15s ease, transform 0.15s ease;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-height: 280px;
      overflow-y: auto;
    }

    .dropdown-menu.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .dropdown-option {
      padding: 10px 12px;
      font-size: 14px;
      color: rgba(245, 245, 247, 0.8);
      cursor: pointer;
      transition: background 0.1s ease, color 0.1s ease;
      border: none;
      width: 100%;
      text-align: left;
      background: transparent;
    }

    .dropdown-option:hover {
      background: rgba(245, 245, 247, 0.1);
      color: rgba(245, 245, 247, 1);
    }

    .dropdown-option.selected {
      background: rgba(100, 150, 255, 0.2);
      color: #f5f5f7;
      border-left: 2px solid rgba(100, 150, 255, 0.6);
      padding-left: 10px;
    }

    .dropdown-option:first-child {
      color: rgba(245, 245, 247, 0.4);
      font-weight: 500;
    }

    .dropdown-option:first-child:hover {
      background: rgba(245, 245, 247, 0.08);
      color: rgba(245, 245, 247, 0.6);
    }

    .dropdown-trigger {
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .dropdown-trigger:hover {
      border-color: rgba(245, 245, 247, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }

    .dropdown-menu.open ~ .dropdown-trigger,
    .dropdown-wrapper:has(.dropdown-menu.open) .dropdown-trigger {
      border-color: rgba(245, 245, 247, 0.3);
      background: rgba(255, 255, 255, 0.08);
    }

    @media (max-width: 735px) {
      .dropdown-menu {
        max-height: 240px;
        margin-top: 6px;
      }

      .dropdown-option {
        padding: 8px 10px;
        font-size: 16px;
      }

      .dropdown-option.selected {
        padding-left: 8px;
      }

      .dropdown-trigger {
        padding: 8px 10px;
        font-size: 16px;
      }

      .dropdown-trigger span:last-child {
        font-size: 9px;
      }
    }

    .modal-submit {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border: none;
      border-radius: 980px;
      background: #f5f5f7;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.01em;
      cursor: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .modal-submit:hover {
      opacity: 0.88;
    }

    .modal-submit:active {
      transform: scale(0.98);
    }

    .modal-success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 16px 0 8px;
      gap: 10px;
    }

    .modal-success .check {
      font-size: 36px;
    }

    .modal-success h3 {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-success p {
      font-size: 13px;
      color: rgba(245, 245, 247, 0.4);
      margin: 0;
    }

    @media (max-width: 735px) {
      h1 { font-size: 44px; }
      .subtitle { font-size: 12px; margin-top: 10px; }
      body { cursor: auto; }
      .cursor-glow { display: none; }
      .inquire-btn { cursor: auto; }
      .modal-close { cursor: auto; }
      .modal-submit { cursor: auto; padding: 10px; }
      .modal-overlay { align-items: flex-end; padding: 0; }
      .modal {
        padding: 22px 16px 20px;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        width: 100%;
        max-width: 100%;
        overflow-y: visible;
      }
      .modal h2 { font-size: 17px; margin-bottom: 3px; }
      .modal > div > p { font-size: 12px; margin-bottom: 14px; }
      .field { margin-bottom: 8px; gap: 4px; }
      .field label { font-size: 10px; }
      .field input, .field textarea, .field select { padding: 8px 10px; font-size: 16px; }
      .field textarea { height: 58px; }
      .form-row { gap: 8px; }
    }
  </style>
</head>
<body>

  <div class="cursor-glow"></div>
  <div class="center">
    <h1>Ethan Gardner</h1>
    <div class="subtitle">
      <span>McCall, Idaho</span>
      <span class="sep">/</span>
      <span class="time"></span>
      <span class="sep weather-sep">/</span>
      <span class="weather"></span>
    </div>
    <a class="inquire-btn" href="#" id="inquire-btn">Inquire for pricing and availability</a>
  </div>

  <!-- Inquiry modal -->
  <div class="modal-overlay" id="modal-overlay" aria-modal="true" role="dialog" aria-labelledby="modal-title">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>

      <div id="modal-form-content">
        <h2 id="modal-title">Get in touch</h2>
        <p>Fill out the form below and I'll get back to you as soon as possible.</p>

        <form id="inquiry-form" novalidate>
          <div class="form-row">
            <div class="field">
              <label for="f-name">Name</label>
              <input id="f-name" name="name" type="text" placeholder="Jane Smith" required />
            </div>
            <div class="field">
              <label for="f-email">Email</label>
              <input id="f-email" name="email" type="email" placeholder="jane@example.com" required />
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="f-phone">Phone</label>
              <input id="f-phone" name="phone" type="tel" placeholder="(208) 555-0100" />
            </div>
            <div class="field">
              <label for="f-type">Type</label>
              <div class="dropdown-wrapper">
                <select id="f-type" name="type" class="dropdown-select" style="display: none;">
                  <option value="">Select...</option>
                  <option>Ski instruction</option>
                  <option>Photography</option>
                  <option>Consulting</option>
                  <option>Other</option>
                </select>
                <div class="dropdown-trigger" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(245, 245, 247, 0.1); border-radius: 10px; padding: 10px 12px; font-size: 14px; color: rgba(245, 245, 247, 0.5); cursor: pointer; position: relative; display: flex; align-items: center; justify-content: space-between;">
                  <span class="dropdown-label">Select...</span>
                  <span style="font-size: 10px; margin-left: 8px;">▼</span>
                </div>
                <div class="dropdown-menu">
                  <button type="button" class="dropdown-option" data-value="">Select...</button>
                  <button type="button" class="dropdown-option" data-value="Ski instruction">Ski instruction</button>
                  <button type="button" class="dropdown-option" data-value="Photography">Photography</button>
                  <button type="button" class="dropdown-option" data-value="Consulting">Consulting</button>
                  <button type="button" class="dropdown-option" data-value="Other">Other</button>
                </div>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="f-dates">Dates / timeframe</label>
            <input id="f-dates" name="dates" type="text" placeholder="e.g. Jan 10–14, 2026" />
          </div>

          <div class="field">
            <label for="f-message">Message</label>
            <textarea id="f-message" name="message" placeholder="Tell me a bit about what you're looking for…"></textarea>
          </div>

          <button type="submit" class="modal-submit">Send inquiry</button>
        </form>
      </div>

      <div class="modal-success" id="modal-success">
        <div class="check">&#10003;</div>
        <h3>Message sent</h3>
        <p>Thanks — I'll be in touch soon.</p>
      </div>
    </div>
  </div>

  <script>
    const TELEGRAM_TOKEN = '__TELEGRAM_BOT_TOKEN__';
    const TELEGRAM_CHAT  = '__TELEGRAM_CHAT_ID__';

    // Cursor glow + parallax tilt
    const glow = document.querySelector('.cursor-glow');
    const heading = document.querySelector('h1');
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
      if (!glow.classList.contains('visible')) glow.classList.add('visible');

      // Parallax tilt
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const rotateY = ((e.clientX - cx) / cx) * 4;
      const rotateX = ((cy - e.clientY) / cy) * 3;
      heading.style.transform = 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
    });
    document.addEventListener('mouseleave', () => {
      glow.classList.remove('visible');
      heading.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });

    // ── Modal ──
    const overlay = document.getElementById('modal-overlay');
    const openBtn = document.getElementById('inquire-btn');
    const closeBtn = document.getElementById('modal-close');
    const form = document.getElementById('inquiry-form');
    const formContent = document.getElementById('modal-form-content');
    const successMsg = document.getElementById('modal-success');

    function openModal() {
      overlay.classList.add('open');
      document.body.classList.add('modal-open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => closeBtn.focus(), 50);
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.classList.remove('modal-open');
      document.body.style.overflow = '';
    }

    openBtn.addEventListener('click', (e) => { e.preventDefault(); openModal(); });
    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        name:    document.getElementById('f-name').value.trim(),
        email:   document.getElementById('f-email').value.trim(),
        phone:   document.getElementById('f-phone').value.trim(),
        type:    document.getElementById('f-type').value.trim(),
        dates:   document.getElementById('f-dates').value.trim(),
        message: document.getElementById('f-message').value.trim(),
      };

      const lines = [
        '📩 *New Inquiry*',
        '',
        `*Name:* ${data.name}`,
        `*Email:* ${data.email}`,
        data.phone   ? `*Phone:* ${data.phone}`      : null,
        data.type    ? `*Type:* ${data.type}`        : null,
        data.dates   ? `*Dates:* ${data.dates}`      : null,
        data.message ? `*Message:*\n${data.message}` : null,
      ].filter(Boolean).join('\n');

      if (TELEGRAM_TOKEN !== '__TELEGRAM_BOT_TOKEN__') {
        fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: TELEGRAM_CHAT, text: lines, parse_mode: 'Markdown' }),
        }).catch(() => {});
      }

      formContent.style.display = 'none';
      successMsg.style.display = 'flex';
      setTimeout(closeModal, 2200);
      setTimeout(() => {
        formContent.style.display = '';
        successMsg.style.display = 'none';
        form.reset();
      }, 2800);
    });

    // ── Time-of-day ambiance colors ──
    const AMBIANCE = [
      { hour: 2.0,  g1:[20,30,80,0.25],   g2:[60,30,100,0.20],  g3:[30,20,60,0.15],   glow:[40,30,100,0.15] },
      { hour: 5.5,  g1:[80,60,120,0.26],   g2:[180,100,80,0.22], g3:[120,80,140,0.18],  glow:[140,100,160,0.16] },
      { hour: 7.5,  g1:[100,160,255,0.28], g2:[200,160,80,0.20], g3:[255,160,120,0.16], glow:[160,180,255,0.18] },
      { hour: 12.0, g1:[100,180,255,0.24], g2:[180,200,255,0.18],g3:[160,220,255,0.14], glow:[140,180,255,0.16] },
      { hour: 15.0, g1:[80,140,255,0.28],  g2:[170,120,255,0.22],g3:[255,120,180,0.18], glow:[160,140,255,0.18] },
      { hour: 18.0, g1:[255,140,60,0.30],  g2:[255,80,100,0.24], g3:[200,100,40,0.20],  glow:[255,160,80,0.18] },
      { hour: 20.0, g1:[120,60,160,0.28],  g2:[200,60,100,0.22], g3:[60,40,120,0.18],   glow:[140,80,180,0.17] },
      { hour: 22.5, g1:[30,50,120,0.26],   g2:[80,40,140,0.22],  g3:[40,30,80,0.16],    glow:[60,50,140,0.16] },
    ];

    function lerpColor(a, b, t) {
      return [
        Math.round(a[0] + (b[0] - a[0]) * t),
        Math.round(a[1] + (b[1] - a[1]) * t),
        Math.round(a[2] + (b[2] - a[2]) * t),
        +(a[3] + (b[3] - a[3]) * t).toFixed(3)
      ];
    }

    function getTimeColors(h) {
      const kf = AMBIANCE, len = kf.length;
      let i = 0;
      while (i < len && kf[i].hour <= h) i++;
      const after = kf[i % len], before = kf[(i - 1 + len) % len];
      let span = after.hour - before.hour;
      if (span <= 0) span += 24;
      let elapsed = h - before.hour;
      if (elapsed < 0) elapsed += 24;
      const t = elapsed / span;
      return {
        g1: lerpColor(before.g1, after.g1, t),
        g2: lerpColor(before.g2, after.g2, t),
        g3: lerpColor(before.g3, after.g3, t),
        glow: lerpColor(before.glow, after.glow, t),
      };
    }

    let lastAmbianceMin = -1;
    function updateAmbiance(mt) {
      const min = mt.getHours() * 60 + mt.getMinutes();
      if (min === lastAmbianceMin) return;
      lastAmbianceMin = min;
      const c = getTimeColors(mt.getHours() + mt.getMinutes() / 60);
      const s = document.documentElement.style;
      s.setProperty('--amb1', c.g1[0]+','+c.g1[1]+','+c.g1[2]);
      s.setProperty('--amb1a', c.g1[3]);
      s.setProperty('--amb2', c.g2[0]+','+c.g2[1]+','+c.g2[2]);
      s.setProperty('--amb2a', c.g2[3]);
      s.setProperty('--amb3', c.g3[0]+','+c.g3[1]+','+c.g3[2]);
      s.setProperty('--amb3a', c.g3[3]);
      s.setProperty('--glow', c.glow[0]+','+c.glow[1]+','+c.glow[2]);
      s.setProperty('--glowa', c.glow[3]);
    }

    // Local time (Mountain Time)
    const timeEl = document.querySelector('.time');
    function tick() {
      const now = new Date();
      const mt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Boise' }));
      const h = mt.getHours();
      const m = String(mt.getMinutes()).padStart(2, '0');
      const period = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      timeEl.textContent = h12 + ':' + m + ' ' + period;
      updateAmbiance(mt);
    }
    tick();
    setInterval(tick, 1000);

    // Weather (Open-Meteo, McCall ID coordinates)
    const weatherEl = document.querySelector('.weather');
    const weatherSep = document.querySelector('.weather-sep');
    weatherSep.style.display = 'none';
    fetch('https://api.open-meteo.com/v1/forecast?latitude=44.7332&longitude=-116.0988&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FBoise')
      .then(r => r.json())
      .then(data => {
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;
        const condition = weatherCondition(code);
        weatherEl.textContent = condition + ' · ' + temp + '°F';
        weatherSep.style.display = '';
      })
      .catch(() => {});

    function weatherCondition(code) {
      if (code === 0) return 'Clear';
      if (code <= 3) return 'Cloudy';
      if (code <= 49) return 'Fog';
      if (code <= 59) return 'Drizzle';
      if (code <= 69) return 'Rain';
      if (code <= 79) return 'Snow';
      if (code <= 82) return 'Showers';
      if (code <= 86) return 'Snow';
      if (code <= 99) return 'Thunderstorm';
      return '';
    }

    // ── Custom dropdown ──
    const dropdownWrappers = document.querySelectorAll('.dropdown-wrapper');
    dropdownWrappers.forEach(wrapper => {
      const trigger = wrapper.querySelector('.dropdown-trigger');
      const menu = wrapper.querySelector('.dropdown-menu');
      const options = wrapper.querySelectorAll('.dropdown-option');
      const label = wrapper.querySelector('.dropdown-label');
      const select = wrapper.querySelector('select');

      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        menu.classList.toggle('open');
      });

      options.forEach(option => {
        option.addEventListener('click', (e) => {
          e.preventDefault();
          const value = option.dataset.value;
          const text = option.textContent;

          // Update trigger label
          label.textContent = text;
          label.style.color = value ? 'rgba(245, 245, 247, 0.9)' : 'rgba(245, 245, 247, 0.5)';

          // Update select value
          select.value = value;

          // Update selected state
          options.forEach(opt => opt.classList.remove('selected'));
          option.classList.add('selected');

          // Close menu
          menu.classList.remove('open');
        });
      });

      // Close menu when clicking outside
      document.addEventListener('click', (e) => {
        if (!wrapper.contains(e.target)) {
          menu.classList.remove('open');
        }
      });

      // Close menu on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          menu.classList.remove('open');
        }
      });
    });
  </script>

</body>
</html>
