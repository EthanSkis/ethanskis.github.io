<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ethan Gardner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      cursor: none;
    }

    /* ── Ambient gradient ── */
    body::before {
      content: '';
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(ellipse at 25% 50%, rgba(80, 140, 255, 0.28) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 20%, rgba(170, 120, 255, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 85%, rgba(255, 120, 180, 0.18) 0%, transparent 55%);
      animation: drift 18s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes drift {
      0%   { transform: scale(1) translate(0, 0) rotate(0deg); }
      25%  { transform: scale(1.12) translate(-4%, 5%) rotate(1deg); }
      50%  { transform: scale(0.94) translate(5%, -3%) rotate(-1deg); }
      75%  { transform: scale(1.08) translate(-2%, -4%) rotate(0.5deg); }
      100% { transform: scale(1.03) translate(3%, 2%) rotate(-0.5deg); }
    }

    /* ── Cursor glow ── */
    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(160, 140, 255, 0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
      opacity: 0;
      mix-blend-mode: screen;
    }

    .cursor-glow.visible {
      opacity: 1;
    }

    /* ── Name ── */
    h1 {
      position: relative;
      z-index: 2;
      font-size: 80px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.05;
      text-align: center;
      padding: 0 24px;
    }

    /* ── Local time ── */
    .time {
      position: fixed;
      bottom: 28px;
      right: 32px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: rgba(245, 245, 247, 0.3);
      z-index: 2;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 1068px) {
      h1 { font-size: 64px; }
    }

    @media (max-width: 735px) {
      h1 { font-size: 44px; }
      body { cursor: auto; }
      .cursor-glow { display: none; }
      .time { bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body>

  <div class="cursor-glow"></div>
  <h1>Ethan Gardner</h1>
  <div class="time"></div>

  <script>
    // Cursor glow
    const glow = document.querySelector('.cursor-glow');
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
      if (!glow.classList.contains('visible')) glow.classList.add('visible');
    });
    document.addEventListener('mouseleave', () => glow.classList.remove('visible'));

    // Local time
    const timeEl = document.querySelector('.time');
    function tick() {
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const period = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      timeEl.textContent = h12 + ':' + m + ' ' + period;
    }
    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
