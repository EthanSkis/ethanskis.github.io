<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0907">
<title>Net Worth</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='6' fill='%23c9a96a'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0907;
  --bg-2:#0f0d0a;
  --gold:#c9a96a;
  --gold-bright:#e8cc8a;
  --gold-deep:#8a7340;
  --rule:rgba(201,169,106,0.22);
  --dot:rgba(201,169,106,0.28);
  --ink:#ece4d2;
  --muted:rgba(236,228,210,0.55);
  --gap:22px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:'Instrument Serif',Georgia,serif;
  min-height:100svh;
  min-height:100dvh;
  overflow:hidden;
  position:relative;
  background-color:var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 38%,rgba(201,169,106,0.10),transparent 60%),
    radial-gradient(circle,var(--dot) 1px,transparent 1.4px);
  background-size:auto,var(--gap) var(--gap);
  background-position:center,center;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:radial-gradient(120% 80% at 50% 50%,transparent 55%,rgba(0,0,0,0.55) 100%);
  z-index:0;
}
.frame{
  position:fixed;
  inset:calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
  border:1px solid var(--rule);
  display:flex;
  flex-direction:column;
  pointer-events:none;
  z-index:1;
  background:linear-gradient(180deg,rgba(15,13,10,0.4),rgba(10,9,7,0.2));
  backdrop-filter:blur(0.5px);
}
.frame::before,.frame::after{
  content:"";
  position:absolute;
  width:14px;height:14px;
  border:1px solid var(--gold);
  opacity:0.85;
}
.frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.masthead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 16px 12px;
  border-bottom:1px solid var(--rule);
  font-family:'DM Mono',monospace;
  font-size:9.5px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--gold);
}
.masthead .right{color:var(--muted)}
.stage{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px 18px;
  position:relative;
}
.eyebrow{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.36em;
  text-transform:uppercase;
  color:var(--gold);
  opacity:0.85;
  margin-bottom:20px;
  position:relative;
  display:inline-block;
}
.eyebrow::before,.eyebrow::after{
  content:"";
  position:absolute;
  top:50%;
  width:28px;
  height:1px;
  background:var(--gold);
  opacity:0.5;
}
.eyebrow::before{right:calc(100% + 12px)}
.eyebrow::after{left:calc(100% + 12px)}
.label{
  font-family:'Instrument Serif',Georgia,serif;
  font-style:italic;
  font-size:24px;
  line-height:1;
  letter-spacing:-0.01em;
  margin-bottom:14px;
  color:var(--ink);
  opacity:0.92;
}
.figure{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:clamp(78px,23vw,134px);
  line-height:0.95;
  letter-spacing:-0.04em;
  font-weight:400;
  background:linear-gradient(180deg,var(--gold-bright) 0%,var(--gold) 45%,var(--gold-deep) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
  text-shadow:0 1px 0 rgba(0,0,0,0.4);
  filter:drop-shadow(0 6px 22px rgba(201,169,106,0.18));
}
.figure .currency{
  font-size:0.55em;
  vertical-align:0.42em;
  margin-right:0.04em;
  opacity:0.85;
}
.flourish{
  margin-top:18px;
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--gold);
  opacity:0.75;
}
.flourish .line{width:36px;height:1px;background:var(--gold);opacity:0.55}
.flourish .diamond{
  width:6px;height:6px;
  background:var(--gold);
  transform:rotate(45deg);
  box-shadow:0 0 10px rgba(201,169,106,0.5);
}
.colophon{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px 14px;
  border-top:1px solid var(--rule);
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:0.24em;
  text-transform:uppercase;
  color:var(--muted);
}
.colophon .dot{
  display:inline-block;
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--gold);
  margin-right:7px;
  vertical-align:1px;
  box-shadow:0 0 6px rgba(201,169,106,0.6);
}
.colophon .right{color:var(--gold);opacity:0.85}
@media (max-height:560px){
  .frame{inset:12px}
  .label{font-size:20px;margin-bottom:8px}
  .eyebrow{margin-bottom:14px}
  .flourish{margin-top:12px}
}
</style>
</head>
<body>
  <div class="frame">
    <div class="masthead">
      <span>Vol. I &nbsp;·&nbsp; No. 01</span>
      <span class="right">EGD / Editorial</span>
    </div>

    <div class="stage">
      <span class="eyebrow">A Personal Ledger</span>
      <div class="label">Net Worth</div>
      <div class="figure"><span class="currency">$</span>1,336</div>
      <div class="flourish" aria-hidden="true">
        <span class="line"></span>
        <span class="diamond"></span>
        <span class="line"></span>
      </div>
    </div>

    <div class="colophon">
      <span><span class="dot"></span>Issue 05·07</span>
      <span class="right">Ethan Gardner</span>
    </div>
  </div>
</body>
</html>
