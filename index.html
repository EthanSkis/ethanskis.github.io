<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ethan Gardner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1f18;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --cream: #f0ead8;
      --sage: #8a9e7a;
      --muted: rgba(240, 234, 216, 0.45);
      --stone: #6b6559;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(74, 95, 58, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(50, 65, 40, 0.3) 0%, transparent 60%);
      color: var(--cream);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
    }

    /* Subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Avatar ── */
    .avatar {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4a5f3a 0%, #2e3d24 100%);
      border: 1.5px solid rgba(138, 158, 122, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--cream);
      letter-spacing: -0.02em;
      margin-bottom: 1.4rem;
      flex-shrink: 0;
    }

    /* ── Name & bio ── */
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.85rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--cream);
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sage);
      text-align: center;
      margin-bottom: 0.85rem;
    }

    .bio {
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      line-height: 1.65;
      max-width: 300px;
      margin-bottom: 2.2rem;
    }

    /* ── Divider ── */
    .divider {
      width: 32px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--sage), transparent);
      margin-bottom: 2.2rem;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.9rem 1.3rem;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--cream);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: all 0.22s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .link-btn:hover,
    .link-btn:active {
      background: rgba(255,255,255,0.08);
      border-color: rgba(138, 158, 122, 0.35);
      transform: translateY(-1px);
    }

    .link-btn-left {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .link-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(138, 158, 122, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .link-arrow {
      color: var(--stone);
      font-size: 0.75rem;
      transition: color 0.2s, transform 0.2s;
    }

    .link-btn:hover .link-arrow {
      color: var(--sage);
      transform: translateX(2px);
    }

    /* ── Location pill ── */
    .location {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--stone);
    }

    .location svg {
      width: 10px;
      height: 10px;
      fill: var(--stone);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding-top: 3rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(107, 101, 89, 0.5);
    }
  </style>
</head>
<body>

  <div class="wrap">

    <div class="avatar">EG</div>

    <h1 class="name">Ethan Gardner</h1>
    <p class="tagline">Developer &amp; Outdoorsman</p>
    <p class="bio">Building things on screens, spending time away from them. Based outside whenever possible.</p>

    <div class="divider"></div>

            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>

      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>

</body>
</html>
