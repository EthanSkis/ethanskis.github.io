<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a; color: #e8e8e8;
      font-family: 'Courier New', monospace;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .wrap { width: 100%; max-width: 520px; padding: 2rem; }
    h1 { font-size: 1rem; letter-spacing: .2em; color: #444; margin-bottom: 2rem; }
    input, textarea {
      width: 100%; background: #111; border: 1px solid #222;
      color: #e8e8e8; font-family: inherit; font-size: .95rem;
      padding: .7rem 1rem; border-radius: 4px; outline: none;
    }
    input:focus, textarea:focus { border-color: #444; }
    textarea { min-height: 220px; resize: vertical; line-height: 1.6; margin-bottom: .75rem; }
    .row { display: flex; gap: .5rem; margin-top: .75rem; }
    button {
      background: #e8e8e8; color: #0a0a0a; border: none;
      padding: .7rem 1.25rem; font-family: inherit;
      font-size: .85rem; cursor: pointer; border-radius: 4px;
    }
    button.ghost {
      background: transparent; color: #555;
      border: 1px solid #222;
    }
    .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; }
    .meta span { font-size: .8rem; color: #444; }
    .err { font-size: .8rem; color: #c0392b; margin-top: .5rem; }
    #authBox, #noteBox { display: none; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>// notes</h1>

  <div id="authBox">
    <input id="u" placeholder="username" autocomplete="off" />
    <div class="row">
      <button onclick="enter()">Enter</button>
    </div>
    <div class="err" id="authErr"></div>
  </div>

  <div id="noteBox">
    <div class="meta">
      <span id="label"></span>
      <button class="ghost" onclick="logout()" style="padding:.4rem .75rem;font-size:.75rem">logout</button>
    </div>
    <textarea id="note" placeholder="Start writing..."></textarea>
    <div class="row">
      <button onclick="save()">Save</button>
      <span id="saveMsg" style="font-size:.8rem;color:#555;align-self:center"></span>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://wuczornurppubchayatb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_nr34BwBdIY4fi3MW-PtsKw_EfjWUXo9';
  const DOMAIN  = 'notes-app.com';
  const SECRET  = 'shared-secret-xK9mP2';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const email = u => `${u.trim().toLowerCase()}@${DOMAIN}`;

  async function enter() {
    const u = document.getElementById('u').value.trim();
    if (!u) return;
    document.getElementById('authErr').textContent = '';

    const { error: loginErr } = await sb.auth.signInWithPassword({ email: email(u), password: SECRET });

    if (loginErr) {
      const { error: signupErr } = await sb.auth.signUp({ email: email(u), password: SECRET });
      if (signupErr) {
        document.getElementById('authErr').textContent = signupErr.message;
        return;
      }
      await sb.auth.signInWithPassword({ email: email(u), password: SECRET });
    }

    show(u);
  }

  async function show(u) {
    document.getElementById('authBox').style.display = 'none';
    document.getElementById('noteBox').style.display = 'block';
    document.getElementById('label').textContent = u;
    const { data } = await sb.from('notes').select('content').single().catch(() => ({ data: null }));
    document.getElementById('note').value = data?.content ?? '';
  }

  async function save() {
    const { data: { user } } = await sb.auth.getUser();
    await sb.from('notes').upsert(
      { user_id: user.id, content: document.getElementById('note').value, updated_at: new Date().toISOString() },
      { onConflict: 'user_id' }
    );
    const msg = document.getElementById('saveMsg');
    msg.textContent = 'Saved';
    setTimeout(() => msg.textContent = '', 2000);
  }

  async function logout() {
    await sb.auth.signOut();
    document.getElementById('noteBox').style.display = 'none';
    document.getElementById('authBox').style.display = 'block';
    document.getElementById('u').value = '';
    document.getElementById('note').value = '';
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const u = session.user.email.replace(`@${DOMAIN}`, '');
      show(u);
    } else {
      document.getElementById('authBox').style.display = 'block';
    }
  })();
</script>
</body>
</html>
