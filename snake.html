<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0d0f;
    --surface: #111214;
    --surface2: #17191c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e6e1;
    --muted: #6b6a66;
    --muted2: #9a9894;
    --red: #e24b4a;
    --red-dim: rgba(226,75,74,0.12);
    --blue: #4a9eff;
    --blue-dim: rgba(74,158,255,0.10);
    --green: #3dba7f;
    --green-dim: rgba(61,186,127,0.10);
    --purple: #9b8cf7;
    --serif: 'Instrument Serif', Georgia, serif;
    --mono: 'DM Mono', monospace;
    --sans: 'Geist', system-ui, sans-serif;
  }

  body {
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 2rem 1rem;
    width: 100%;
    max-width: 480px;
  }

  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  h1 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
    font-style: italic;
  }

  .ai-toggle {
    position: absolute;
    right: 0;
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .ai-toggle:hover {
    background: var(--surface2);
    color: var(--muted2);
  }

  .ai-toggle.active {
    background: rgba(155,140,247,0.15);
    border-color: rgba(155,140,247,0.4);
    color: var(--purple);
  }

  .ai-toggle svg {
    width: 18px; height: 18px;
    fill: currentColor;
  }

  .scoreboard {
    display: flex;
    gap: 0;
    align-items: stretch;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    width: 100%;
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 12px 24px;
    flex: 1;
  }

  .score-item + .score-item {
    border-left: 1px solid var(--border);
  }

  .score-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .score-value {
    font-family: var(--serif);
    font-size: 1.75rem;
    line-height: 1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .game-wrapper {
    padding: 12px;
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: fit-content;
  }

  canvas {
    display: block;
    border-radius: 8px;
    background: var(--bg);
  }

  .controls {
    display: none;
    gap: 8px;
    padding: 4px 0;
    width: 100%;
  }

  .ctrl-row {
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .ctrl-btn {
    width: 56px; height: 56px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active {
    background: var(--surface2);
    transform: scale(0.92);
  }

  .ctrl-spacer { width: 56px; height: 56px; }

  @media (pointer: coarse) {
    .controls { display: grid; }
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 12px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(12,13,15,0.85);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-family: var(--serif);
    font-size: 1.75rem;
    font-style: italic;
    color: var(--text);
  }

  .overlay-sub {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.04em;
  }

  .btn {
    padding: 8px 28px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.06em;
  }

  .btn:hover { background: rgba(255,255,255,0.08); }
  .btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Snake</h1>
    <button class="ai-toggle" id="aiToggle" title="AI Autopilot">
      <svg viewBox="0 0 512 512"><g transform="translate(64,64)" fill="currentColor"><path d="M320,64 L320,320 L64,320 L64,64 L320,64 Z M171.749388,128 L146.817842,128 L99.4840387,256 L121.976629,256 L130.913039,230.977 L187.575039,230.977 L196.319607,256 L220.167172,256 L171.749388,128 Z M260.093778,128 L237.691519,128 L237.691519,256 L260.093778,256 L260.093778,128 Z M159.094727,149.47526 L181.409039,213.333 L137.135039,213.333 L159.094727,149.47526 Z M341.333333,256 L384,256 L384,298.666667 L341.333333,298.666667 L341.333333,256 Z M85.3333333,341.333333 L128,341.333333 L128,384 L85.3333333,384 L85.3333333,341.333333 Z M170.666667,341.333333 L213.333333,341.333333 L213.333333,384 L170.666667,384 L170.666667,341.333333 Z M85.3333333,0 L128,0 L128,42.6666667 L85.3333333,42.6666667 L85.3333333,0 Z M256,341.333333 L298.666667,341.333333 L298.666667,384 L256,384 L256,341.333333 Z M170.666667,0 L213.333333,0 L213.333333,42.6666667 L170.666667,42.6666667 L170.666667,0 Z M256,0 L298.666667,0 L298.666667,42.6666667 L256,42.6666667 L256,0 Z M341.333333,170.666667 L384,170.666667 L384,213.333333 L341.333333,213.333333 L341.333333,170.666667 Z M0,256 L42.6666667,256 L42.6666667,298.666667 L0,298.666667 L0,256 Z M341.333333,85.3333333 L384,85.3333333 L384,128 L341.333333,128 L341.333333,85.3333333 Z M0,170.666667 L42.6666667,170.666667 L42.6666667,213.333333 L0,213.333333 L0,170.666667 Z M0,85.3333333 L42.6666667,85.3333333 L42.6666667,128 L0,128 L0,85.3333333 Z"/></g></svg>
    </button>
  </div>

  <div class="scoreboard">
    <div class="score-item">
      <span class="score-label">Score</span>
      <span class="score-value" id="score">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">Best</span>
      <span class="score-value" id="best">0</span>
    </div>
  </div>

  <div class="game-wrapper">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlayTitle">Snake</div>
      <div class="overlay-sub" id="overlaySub">Press Space or tap Play to start</div>
      <button class="btn" id="playBtn">Play</button>
    </div>
  </div>

  <div class="controls" id="controls">
    <div class="ctrl-row">
      <div class="ctrl-spacer"></div>
      <button class="ctrl-btn" data-dir="up">&#9650;</button>
      <div class="ctrl-spacer"></div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" data-dir="left">&#9664;</button>
      <button class="ctrl-btn" data-dir="down">&#9660;</button>
      <button class="ctrl-btn" data-dir="right">&#9654;</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const playBtn = document.getElementById('playBtn');
  const aiToggle = document.getElementById('aiToggle');

  const GRID = 20;
  const TOTAL = GRID * GRID;
  const CELL = canvas.width / GRID;
  const BASE_INTERVAL = 130;
  const MIN_INTERVAL = 60;
  const AI_INTERVAL = 35;

  let snake, dir, nextDir, food, score, best, running, lastTime, interval, growPending;
  let aiActive = false;

  best = parseInt(localStorage.getItem('snakeBest') || '0', 10);
  bestEl.textContent = best;

  // --- Hamiltonian cycle ---
  // Build a cycle that visits every cell on the GRID x GRID board exactly once.
  // Pattern: down column 0, then zigzag columns 1..GRID-1 (rows 1..GRID-1),
  // then back along row 0 to close the loop.
  const cycleOrder = new Array(GRID * GRID); // cycleOrder[y * GRID + x] = step index
  let step = 0;

  // Column 0: top to bottom
  for (let y = 0; y < GRID; y++) cycleOrder[y * GRID + 0] = step++;
  // Columns 1..GRID-1 zigzag between rows 1..GRID-1
  for (let x = 1; x < GRID; x++) {
    if (x % 2 === 1) {
      // up: row GRID-1 to row 1
      for (let y = GRID - 1; y >= 1; y--) cycleOrder[y * GRID + x] = step++;
    } else {
      // down: row 1 to row GRID-1
      for (let y = 1; y < GRID; y++) cycleOrder[y * GRID + x] = step++;
    }
  }
  // Row 0: right-to-left from column GRID-1 back to column 1
  for (let x = GRID - 1; x >= 1; x--) cycleOrder[0 * GRID + x] = step++;

  // Precompute the next cell in the cycle for each cell
  const cycleNext = new Array(TOTAL); // cycleNext[y * GRID + x] = {x, y}
  // Build inverse: stepToCell[step] = flat index
  const stepToCell = new Array(TOTAL);
  for (let i = 0; i < TOTAL; i++) stepToCell[cycleOrder[i]] = i;
  for (let s = 0; s < TOTAL; s++) {
    const nextS = (s + 1) % TOTAL;
    const flatNext = stepToCell[nextS];
    cycleNext[stepToCell[s]] = { x: flatNext % GRID, y: Math.floor(flatNext / GRID) };
  }

  function cellIndex(x, y) { return y * GRID + x; }
  function cyclePos(x, y) { return cycleOrder[cellIndex(x, y)]; }

  // Distance forward in cycle from a to b
  function cycleDist(a, b) { return (b - a + TOTAL) % TOTAL; }

  // --- AI logic ---
  function aiChooseDirection() {
    const head = snake[0];
    const tail = snake[snake.length - 1];
    const headPos = cyclePos(head.x, head.y);
    const foodPos = cyclePos(food.x, food.y);
    const tailPos = cyclePos(tail.x, tail.y);

    // Build set of occupied cells for fast lookup
    const occupied = new Set();
    for (const s of snake) occupied.add(cellIndex(s.x, s.y));

    const directions = [
      { x: 0, y: -1 },
      { x: 0, y: 1 },
      { x: -1, y: 0 },
      { x: 1, y: 0 },
    ];

    // Filter to safe moves (in bounds, not hitting body)
    const safeMoves = [];
    for (const d of directions) {
      const nx = head.x + d.x;
      const ny = head.y + d.y;
      if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) continue;
      if (occupied.has(cellIndex(nx, ny))) continue;
      safeMoves.push({ d, nx, ny });
    }

    if (safeMoves.length === 0) {
      // No safe move — just follow cycle (will die, but nothing we can do)
      const cn = cycleNext[cellIndex(head.x, head.y)];
      return { x: cn.x - head.x, y: cn.y - head.y };
    }

    // For each safe move, check if it "cuts" ahead in the cycle toward food
    // while staying behind the tail. A move to (nx,ny) is valid if:
    //   cycleDist(headPos, movePos) <= cycleDist(headPos, tailPos)
    // i.e. we don't overtake our tail in cycle order.
    // Among valid moves, pick the one closest to food in cycle distance.

    let bestMove = null;
    let bestDist = Infinity;

    for (const { d, nx, ny } of safeMoves) {
      const movePos = cyclePos(nx, ny);
      const distToTail = cycleDist(headPos, tailPos);
      const distToMove = cycleDist(headPos, movePos);

      // The move must not overtake the tail in cycle order
      if (distToMove <= distToTail) {
        const distToFood = cycleDist(movePos, foodPos);
        if (distToFood < bestDist) {
          bestDist = distToFood;
          bestMove = d;
        }
      }
    }

    // Fallback: follow the Hamiltonian cycle exactly
    if (!bestMove) {
      const cn = cycleNext[cellIndex(head.x, head.y)];
      bestMove = { x: cn.x - head.x, y: cn.y - head.y };
    }

    return bestMove;
  }

  // --- Game logic ---
  function init() {
    const mid = Math.floor(GRID / 2);
    snake = [{ x: mid, y: mid }, { x: mid - 1, y: mid }, { x: mid - 2, y: mid }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    growPending = 0;
    interval = aiActive ? AI_INTERVAL : BASE_INTERVAL;
    scoreEl.textContent = '0';
    placeFood();
  }

  function placeFood() {
    const free = [];
    for (let x = 0; x < GRID; x++) {
      for (let y = 0; y < GRID; y++) {
        if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y });
      }
    }
    if (free.length === 0) return win();
    food = free[Math.floor(Math.random() * free.length)];
  }

  function win() {
    running = false;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      bestEl.textContent = best;
    }
    overlayTitle.textContent = 'You Win!';
    overlaySub.textContent = `Perfect score: ${score}`;
    playBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function update() {
    if (aiActive && running) {
      const aiDir = aiChooseDirection();
      nextDir = aiDir;
    }

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      growPending++;
      if (!aiActive) interval = Math.max(MIN_INTERVAL, BASE_INTERVAL - score * 3);
      placeFood();
      if (!running) return; // win() was called
    }

    if (growPending > 0) growPending--;
    else snake.pop();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }

    // Food glow
    if (food) {
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      const glow = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL * 1.8);
      glow.addColorStop(0, 'rgba(226,75,74,0.2)');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(food.x * CELL - CELL, food.y * CELL - CELL, CELL * 3, CELL * 3);

      // Food
      ctx.fillStyle = 'rgba(226,75,74,0.9)';
      ctx.shadowColor = 'rgba(226,75,74,0.5)';
      ctx.shadowBlur = 8;
      roundRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4, 5);
      ctx.shadowBlur = 0;
    }

    // Snake
    snake.forEach((seg, i) => {
      const t = i / snake.length;
      const alpha = 1 - t * 0.5;
      if (i === 0) {
        ctx.fillStyle = aiActive
          ? `rgba(155,140,247,${alpha})`
          : `rgba(74,158,255,${alpha})`;
        ctx.shadowColor = aiActive ? 'rgba(155,140,247,0.5)' : 'rgba(74,158,255,0.4)';
        ctx.shadowBlur = 10;
      } else {
        ctx.fillStyle = aiActive
          ? `rgba(130,115,220,${alpha * 0.85})`
          : `rgba(61,130,220,${alpha * 0.85})`;
        ctx.shadowBlur = 0;
      }
      roundRect(seg.x * CELL + 1.5, seg.y * CELL + 1.5, CELL - 3, CELL - 3, 5);
      ctx.shadowBlur = 0;
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  function gameOver() {
    running = false;
    aiActive = false;
    aiToggle.classList.remove('active');
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      bestEl.textContent = best;
    }
    overlayTitle.textContent = 'Game Over';
    overlaySub.textContent = `Score: ${score}`;
    playBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function startGame() {
    init();
    overlay.classList.add('hidden');
    running = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function loop(time) {
    if (!running) return;
    if (time - lastTime >= interval) {
      update();
      if (!running) return;
      lastTime = time;
    }
    draw();
    requestAnimationFrame(loop);
  }

  function setDirection(x, y) {
    if (aiActive) return; // ignore manual input during AI
    if (dir.x + x !== 0 || dir.y + y !== 0) {
      nextDir = { x, y };
    }
  }

  // AI toggle
  aiToggle.addEventListener('click', () => {
    aiActive = !aiActive;
    aiToggle.classList.toggle('active', aiActive);
    if (aiActive) {
      interval = AI_INTERVAL;
      // If game not running, auto-start
      if (!running) startGame();
    } else {
      interval = Math.max(MIN_INTERVAL, BASE_INTERVAL - score * 3);
    }
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDirection(0, -1); break;
      case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDirection(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDirection(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1, 0); break;
      case ' ': e.preventDefault(); if (!running) startGame(); break;
    }
  });

  // Touch controls
  document.querySelectorAll('.ctrl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = btn.dataset.dir;
      if (d === 'up') setDirection(0, -1);
      else if (d === 'down') setDirection(0, 1);
      else if (d === 'left') setDirection(-1, 0);
      else if (d === 'right') setDirection(1, 0);
    });
  });

  // Swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  playBtn.addEventListener('click', startGame);

  // Initial draw
  init();
  draw();
})();
</script>
</body>
</html>
