<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(circle at 20% 20%, rgba(120, 80, 255, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255, 100, 150, 0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(80, 200, 255, 0.08) 0%, transparent 60%);
    animation: bgFloat 20s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes bgFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(2%, -2%) rotate(1deg); }
    66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 0 2px 20px rgba(120, 80, 255, 0.3);
  }

  .glass {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 24px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .scoreboard {
    display: flex;
    gap: 32px;
    padding: 16px 36px;
    align-items: center;
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .score-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255, 255, 255, 0.45);
  }

  .score-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.9);
    font-variant-numeric: tabular-nums;
  }

  .divider {
    width: 1px;
    height: 36px;
    background: rgba(255, 255, 255, 0.1);
  }

  .game-wrapper {
    padding: 16px;
    position: relative;
  }

  canvas {
    display: block;
    border-radius: 16px;
    background: rgba(0, 0, 0, 0.25);
    box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
  }

  .controls {
    display: none;
    gap: 8px;
    padding: 12px 16px;
  }

  .ctrl-row {
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .ctrl-btn {
    width: 56px; height: 56px;
    border: none;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.8);
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(0.92);
  }

  .ctrl-spacer { width: 56px; height: 56px; }

  @media (pointer: coarse) {
    .controls { display: grid; }
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 16px;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.9);
  }

  .overlay-sub {
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.5);
    text-align: center;
    line-height: 1.5;
  }

  .btn {
    padding: 12px 36px;
    border: none;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: rgba(255, 255, 255, 0.9);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .btn:hover { background: rgba(255, 255, 255, 0.22); }
  .btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<div class="container">
  <h1>Snake</h1>

  <div class="scoreboard glass">
    <div class="score-item">
      <span class="score-label">Score</span>
      <span class="score-value" id="score">0</span>
    </div>
    <div class="divider"></div>
    <div class="score-item">
      <span class="score-label">Best</span>
      <span class="score-value" id="best">0</span>
    </div>
  </div>

  <div class="game-wrapper glass">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlayTitle">Snake</div>
      <div class="overlay-sub" id="overlaySub">Press Space or tap Play to start</div>
      <button class="btn" id="playBtn">Play</button>
    </div>
  </div>

  <div class="controls glass" id="controls">
    <div class="ctrl-row">
      <div class="ctrl-spacer"></div>
      <button class="ctrl-btn" data-dir="up">&#9650;</button>
      <div class="ctrl-spacer"></div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" data-dir="left">&#9664;</button>
      <button class="ctrl-btn" data-dir="down">&#9660;</button>
      <button class="ctrl-btn" data-dir="right">&#9654;</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const playBtn = document.getElementById('playBtn');

  const GRID = 20;
  const CELL = canvas.width / GRID;
  const BASE_INTERVAL = 130;
  const MIN_INTERVAL = 60;

  let snake, dir, nextDir, food, score, best, running, lastTime, interval, growPending;

  best = parseInt(localStorage.getItem('snakeBest') || '0', 10);
  bestEl.textContent = best;

  function init() {
    const mid = Math.floor(GRID / 2);
    snake = [{ x: mid, y: mid }, { x: mid - 1, y: mid }, { x: mid - 2, y: mid }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    growPending = 0;
    interval = BASE_INTERVAL;
    scoreEl.textContent = '0';
    placeFood();
  }

  function placeFood() {
    const free = [];
    for (let x = 0; x < GRID; x++) {
      for (let y = 0; y < GRID; y++) {
        if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y });
      }
    }
    food = free[Math.floor(Math.random() * free.length)];
  }

  function update() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      growPending++;
      interval = Math.max(MIN_INTERVAL, BASE_INTERVAL - score * 3);
      placeFood();
    }

    if (growPending > 0) growPending--;
    else snake.pop();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }

    // Food glow
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    const glow = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL * 1.8);
    glow.addColorStop(0, 'rgba(255,100,130,0.25)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(food.x * CELL - CELL, food.y * CELL - CELL, CELL * 3, CELL * 3);

    // Food
    ctx.fillStyle = 'rgba(255,100,130,0.9)';
    ctx.shadowColor = 'rgba(255,100,130,0.6)';
    ctx.shadowBlur = 10;
    roundRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4, 5);
    ctx.shadowBlur = 0;

    // Snake
    snake.forEach((seg, i) => {
      const t = i / snake.length;
      const alpha = 1 - t * 0.5;
      if (i === 0) {
        ctx.fillStyle = `rgba(130,220,255,${alpha})`;
        ctx.shadowColor = 'rgba(130,220,255,0.5)';
        ctx.shadowBlur = 12;
      } else {
        ctx.fillStyle = `rgba(100,200,240,${alpha * 0.85})`;
        ctx.shadowBlur = 0;
      }
      roundRect(seg.x * CELL + 1.5, seg.y * CELL + 1.5, CELL - 3, CELL - 3, 5);
      ctx.shadowBlur = 0;

      // Gloss on head
      if (i === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        roundRect(seg.x * CELL + 3, seg.y * CELL + 3, CELL - 6, (CELL - 6) / 2, 3);
      }
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  function gameOver() {
    running = false;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      bestEl.textContent = best;
    }
    overlayTitle.textContent = 'Game Over';
    overlaySub.textContent = `Score: ${score}`;
    playBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function startGame() {
    init();
    overlay.classList.add('hidden');
    running = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function loop(time) {
    if (!running) return;
    if (time - lastTime >= interval) {
      update();
      if (!running) return;
      lastTime = time;
    }
    draw();
    requestAnimationFrame(loop);
  }

  function setDirection(x, y) {
    if (dir.x + x !== 0 || dir.y + y !== 0) {
      nextDir = { x, y };
    }
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDirection(0, -1); break;
      case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDirection(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDirection(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1, 0); break;
      case ' ': e.preventDefault(); if (!running) startGame(); break;
    }
  });

  // Touch controls
  document.querySelectorAll('.ctrl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = btn.dataset.dir;
      if (d === 'up') setDirection(0, -1);
      else if (d === 'down') setDirection(0, 1);
      else if (d === 'left') setDirection(-1, 0);
      else if (d === 'right') setDirection(1, 0);
    });
  });

  // Swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  playBtn.addEventListener('click', startGame);

  // Initial draw
  init();
  draw();
})();
</script>
</body>
</html>
