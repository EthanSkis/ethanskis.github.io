<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(circle at 20% 20%, rgba(120, 80, 255, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255, 100, 150, 0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(80, 200, 255, 0.08) 0%, transparent 60%);
    animation: bgFloat 20s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes bgFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(2%, -2%) rotate(1deg); }
    66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 0 2px 20px rgba(120, 80, 255, 0.3);
  }

  .ai-toggle {
    position: absolute;
    right: 0;
    width: 44px; height: 44px;
    border: none;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.45);
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  .ai-toggle:hover {
    background: rgba(255, 255, 255, 0.14);
    color: rgba(255, 255, 255, 0.7);
  }

  .ai-toggle.active {
    background: rgba(120, 80, 255, 0.25);
    border-color: rgba(120, 80, 255, 0.5);
    color: rgba(200, 170, 255, 0.95);
    box-shadow: 0 4px 20px rgba(120, 80, 255, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .ai-toggle svg {
    width: 22px; height: 22px;
    fill: currentColor;
  }

  .glass {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 24px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .scoreboard {
    display: flex;
    gap: 32px;
    padding: 16px 36px;
    align-items: center;
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .score-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255, 255, 255, 0.45);
  }

  .score-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.9);
    font-variant-numeric: tabular-nums;
  }

  .divider {
    width: 1px;
    height: 36px;
    background: rgba(255, 255, 255, 0.1);
  }

  .game-wrapper {
    padding: 16px;
    position: relative;
  }

  canvas {
    display: block;
    border-radius: 16px;
    background: rgba(0, 0, 0, 0.25);
    box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
  }

  .controls {
    display: none;
    gap: 8px;
    padding: 12px 16px;
  }

  .ctrl-row {
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .ctrl-btn {
    width: 56px; height: 56px;
    border: none;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.8);
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(0.92);
  }

  .ctrl-spacer { width: 56px; height: 56px; }

  @media (pointer: coarse) {
    .controls { display: grid; }
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 16px;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.9);
  }

  .overlay-sub {
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.5);
    text-align: center;
    line-height: 1.5;
  }

  .btn {
    padding: 12px 36px;
    border: none;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: rgba(255, 255, 255, 0.9);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .btn:hover { background: rgba(255, 255, 255, 0.22); }
  .btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Snake</h1>
    <button class="ai-toggle" id="aiToggle" title="AI Autopilot">
      <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1.07A7.001 7.001 0 0 1 7.07 19H6a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h-1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2zM9.5 16a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>
    </button>
  </div>

  <div class="scoreboard glass">
    <div class="score-item">
      <span class="score-label">Score</span>
      <span class="score-value" id="score">0</span>
    </div>
    <div class="divider"></div>
    <div class="score-item">
      <span class="score-label">Best</span>
      <span class="score-value" id="best">0</span>
    </div>
  </div>

  <div class="game-wrapper glass">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlayTitle">Snake</div>
      <div class="overlay-sub" id="overlaySub">Press Space or tap Play to start</div>
      <button class="btn" id="playBtn">Play</button>
    </div>
  </div>

  <div class="controls glass" id="controls">
    <div class="ctrl-row">
      <div class="ctrl-spacer"></div>
      <button class="ctrl-btn" data-dir="up">&#9650;</button>
      <div class="ctrl-spacer"></div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" data-dir="left">&#9664;</button>
      <button class="ctrl-btn" data-dir="down">&#9660;</button>
      <button class="ctrl-btn" data-dir="right">&#9654;</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const playBtn = document.getElementById('playBtn');
  const aiToggle = document.getElementById('aiToggle');

  const GRID = 20;
  const TOTAL = GRID * GRID;
  const CELL = canvas.width / GRID;
  const BASE_INTERVAL = 130;
  const MIN_INTERVAL = 60;
  const AI_INTERVAL = 35;

  let snake, dir, nextDir, food, score, best, running, lastTime, interval, growPending;
  let aiActive = false;

  best = parseInt(localStorage.getItem('snakeBest') || '0', 10);
  bestEl.textContent = best;

  // --- Hamiltonian cycle ---
  // Build a cycle that visits every cell on the GRID x GRID board exactly once.
  // Pattern: down column 0, then zigzag columns 1..GRID-1 (rows 1..GRID-1),
  // then back along row 0 to close the loop.
  const cycleOrder = new Array(GRID * GRID); // cycleOrder[y * GRID + x] = step index
  let step = 0;

  // Column 0: top to bottom
  for (let y = 0; y < GRID; y++) cycleOrder[y * GRID + 0] = step++;
  // Columns 1..GRID-1 zigzag between rows 1..GRID-1
  for (let x = 1; x < GRID; x++) {
    if (x % 2 === 1) {
      // up: row GRID-1 to row 1
      for (let y = GRID - 1; y >= 1; y--) cycleOrder[y * GRID + x] = step++;
    } else {
      // down: row 1 to row GRID-1
      for (let y = 1; y < GRID; y++) cycleOrder[y * GRID + x] = step++;
    }
  }
  // Row 0: right-to-left from column GRID-1 back to column 1
  for (let x = GRID - 1; x >= 1; x--) cycleOrder[0 * GRID + x] = step++;

  // Precompute the next cell in the cycle for each cell
  const cycleNext = new Array(TOTAL); // cycleNext[y * GRID + x] = {x, y}
  // Build inverse: stepToCell[step] = flat index
  const stepToCell = new Array(TOTAL);
  for (let i = 0; i < TOTAL; i++) stepToCell[cycleOrder[i]] = i;
  for (let s = 0; s < TOTAL; s++) {
    const nextS = (s + 1) % TOTAL;
    const flatNext = stepToCell[nextS];
    cycleNext[stepToCell[s]] = { x: flatNext % GRID, y: Math.floor(flatNext / GRID) };
  }

  function cellIndex(x, y) { return y * GRID + x; }
  function cyclePos(x, y) { return cycleOrder[cellIndex(x, y)]; }

  // Distance forward in cycle from a to b
  function cycleDist(a, b) { return (b - a + TOTAL) % TOTAL; }

  // --- AI logic ---
  function aiChooseDirection() {
    const head = snake[0];
    const tail = snake[snake.length - 1];
    const headPos = cyclePos(head.x, head.y);
    const foodPos = cyclePos(food.x, food.y);
    const tailPos = cyclePos(tail.x, tail.y);

    // Build set of occupied cells for fast lookup
    const occupied = new Set();
    for (const s of snake) occupied.add(cellIndex(s.x, s.y));

    const directions = [
      { x: 0, y: -1 },
      { x: 0, y: 1 },
      { x: -1, y: 0 },
      { x: 1, y: 0 },
    ];

    // Filter to safe moves (in bounds, not hitting body)
    const safeMoves = [];
    for (const d of directions) {
      const nx = head.x + d.x;
      const ny = head.y + d.y;
      if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) continue;
      if (occupied.has(cellIndex(nx, ny))) continue;
      safeMoves.push({ d, nx, ny });
    }

    if (safeMoves.length === 0) {
      // No safe move — just follow cycle (will die, but nothing we can do)
      const cn = cycleNext[cellIndex(head.x, head.y)];
      return { x: cn.x - head.x, y: cn.y - head.y };
    }

    // For each safe move, check if it "cuts" ahead in the cycle toward food
    // while staying behind the tail. A move to (nx,ny) is valid if:
    //   cycleDist(headPos, movePos) <= cycleDist(headPos, tailPos)
    // i.e. we don't overtake our tail in cycle order.
    // Among valid moves, pick the one closest to food in cycle distance.

    let bestMove = null;
    let bestDist = Infinity;

    for (const { d, nx, ny } of safeMoves) {
      const movePos = cyclePos(nx, ny);
      const distToTail = cycleDist(headPos, tailPos);
      const distToMove = cycleDist(headPos, movePos);

      // The move must not overtake the tail in cycle order
      if (distToMove <= distToTail) {
        const distToFood = cycleDist(movePos, foodPos);
        if (distToFood < bestDist) {
          bestDist = distToFood;
          bestMove = d;
        }
      }
    }

    // Fallback: follow the Hamiltonian cycle exactly
    if (!bestMove) {
      const cn = cycleNext[cellIndex(head.x, head.y)];
      bestMove = { x: cn.x - head.x, y: cn.y - head.y };
    }

    return bestMove;
  }

  // --- Game logic ---
  function init() {
    const mid = Math.floor(GRID / 2);
    snake = [{ x: mid, y: mid }, { x: mid - 1, y: mid }, { x: mid - 2, y: mid }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    growPending = 0;
    interval = aiActive ? AI_INTERVAL : BASE_INTERVAL;
    scoreEl.textContent = '0';
    placeFood();
  }

  function placeFood() {
    const free = [];
    for (let x = 0; x < GRID; x++) {
      for (let y = 0; y < GRID; y++) {
        if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y });
      }
    }
    if (free.length === 0) return win();
    food = free[Math.floor(Math.random() * free.length)];
  }

  function win() {
    running = false;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      bestEl.textContent = best;
    }
    overlayTitle.textContent = 'You Win!';
    overlaySub.textContent = `Perfect score: ${score}`;
    playBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function update() {
    if (aiActive && running) {
      const aiDir = aiChooseDirection();
      nextDir = aiDir;
    }

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      growPending++;
      if (!aiActive) interval = Math.max(MIN_INTERVAL, BASE_INTERVAL - score * 3);
      placeFood();
      if (!running) return; // win() was called
    }

    if (growPending > 0) growPending--;
    else snake.pop();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }

    // Food glow
    if (food) {
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      const glow = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL * 1.8);
      glow.addColorStop(0, 'rgba(255,100,130,0.25)');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(food.x * CELL - CELL, food.y * CELL - CELL, CELL * 3, CELL * 3);

      // Food
      ctx.fillStyle = 'rgba(255,100,130,0.9)';
      ctx.shadowColor = 'rgba(255,100,130,0.6)';
      ctx.shadowBlur = 10;
      roundRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4, 5);
      ctx.shadowBlur = 0;
    }

    // Snake
    const snakeR = aiActive ? 130 : 130;
    const snakeG = aiActive ? 180 : 220;
    const snakeB = aiActive ? 255 : 255;
    const bodyR = aiActive ? 110 : 100;
    const bodyG = aiActive ? 140 : 200;
    const bodyB = aiActive ? 255 : 240;

    snake.forEach((seg, i) => {
      const t = i / snake.length;
      const alpha = 1 - t * 0.5;
      if (i === 0) {
        ctx.fillStyle = aiActive
          ? `rgba(160,120,255,${alpha})`
          : `rgba(${snakeR},${snakeG},${snakeB},${alpha})`;
        ctx.shadowColor = aiActive ? 'rgba(160,120,255,0.6)' : 'rgba(130,220,255,0.5)';
        ctx.shadowBlur = 12;
      } else {
        ctx.fillStyle = aiActive
          ? `rgba(130,100,240,${alpha * 0.85})`
          : `rgba(${bodyR},${bodyG},${bodyB},${alpha * 0.85})`;
        ctx.shadowBlur = 0;
      }
      roundRect(seg.x * CELL + 1.5, seg.y * CELL + 1.5, CELL - 3, CELL - 3, 5);
      ctx.shadowBlur = 0;

      // Gloss on head
      if (i === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        roundRect(seg.x * CELL + 3, seg.y * CELL + 3, CELL - 6, (CELL - 6) / 2, 3);
      }
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  function gameOver() {
    running = false;
    aiActive = false;
    aiToggle.classList.remove('active');
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      bestEl.textContent = best;
    }
    overlayTitle.textContent = 'Game Over';
    overlaySub.textContent = `Score: ${score}`;
    playBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function startGame() {
    init();
    overlay.classList.add('hidden');
    running = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function loop(time) {
    if (!running) return;
    if (time - lastTime >= interval) {
      update();
      if (!running) return;
      lastTime = time;
    }
    draw();
    requestAnimationFrame(loop);
  }

  function setDirection(x, y) {
    if (aiActive) return; // ignore manual input during AI
    if (dir.x + x !== 0 || dir.y + y !== 0) {
      nextDir = { x, y };
    }
  }

  // AI toggle
  aiToggle.addEventListener('click', () => {
    aiActive = !aiActive;
    aiToggle.classList.toggle('active', aiActive);
    if (aiActive) {
      interval = AI_INTERVAL;
      // If game not running, auto-start
      if (!running) startGame();
    } else {
      interval = Math.max(MIN_INTERVAL, BASE_INTERVAL - score * 3);
    }
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDirection(0, -1); break;
      case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDirection(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDirection(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1, 0); break;
      case ' ': e.preventDefault(); if (!running) startGame(); break;
    }
  });

  // Touch controls
  document.querySelectorAll('.ctrl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = btn.dataset.dir;
      if (d === 'up') setDirection(0, -1);
      else if (d === 'down') setDirection(0, 1);
      else if (d === 'left') setDirection(-1, 0);
      else if (d === 'right') setDirection(1, 0);
    });
  });

  // Swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  playBtn.addEventListener('click', startGame);

  // Initial draw
  init();
  draw();
})();
</script>
</body>
</html>
