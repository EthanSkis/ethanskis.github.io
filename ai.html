<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080808;
      --surface:   #111;
      --surface2:  #181818;
      --surface3:  #202020;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --text:      #ececec;
      --muted:     #555;
      --muted2:    #888;
      --accent:    #c8ff00;
      --accent-bg: rgba(200,255,0,0.07);
      --accent-border: rgba(200,255,0,0.18);
      --error:     #ff5555;
      --error-bg:  rgba(255,85,85,0.07);
      --radius:    10px;
      --font-ui:   'IBM Plex Mono', monospace;
      --font-head: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chat-shell {
      width: 100%;
      max-width: 700px;
      height: min(760px, calc(100vh - 40px));
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .pulse-ring {
      position: relative;
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-core 2s ease-in-out infinite;
    }
    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: pulse-ring 2s ease-in-out infinite;
    }
    .pulse-ring.error::before { background: var(--error); }
    .pulse-ring.error::after  { background: var(--error); }
    .pulse-ring.busy::before  { background: #ffaa00; animation: none; }
    .pulse-ring.busy::after   { display: none; }

    @keyframes pulse-core { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes pulse-ring  { 0%{transform:scale(1);opacity:0.4} 100%{transform:scale(2.2);opacity:0} }

    .header-info { flex: 1; min-width: 0; }
    .header-title {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }
    .header-status {
      font-size: 10px;
      color: var(--muted2);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tunnel-tag {
      font-size: 10px;
      font-family: var(--font-ui);
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      padding: 3px 9px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 40px 20px;
    }
    .empty-glyph {
      font-family: var(--font-head);
      font-size: 38px;
      font-weight: 700;
      color: var(--surface3);
      letter-spacing: -2px;
      user-select: none;
    }
    .empty-label { font-size: 11px; color: var(--muted); line-height: 1.8; }

    /* Message rows */
    .msg { display: flex; gap: 12px; animation: msg-in 0.18s ease; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes msg-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .av {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 500;
      flex-shrink: 0;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }
    .av.ai   { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
    .av.user { background: var(--surface3); color: var(--muted2); border: 1px solid var(--border); }

    .bubble {
      max-width: 78%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12.5px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--surface3);
      border-color: var(--border2);
    }
    .bubble.thinking {
      color: var(--muted2);
      font-style: italic;
    }
    .bubble.error {
      background: var(--error-bg);
      border-color: rgba(255,85,85,0.2);
      color: var(--error);
    }

    /* Thinking dots */
    .dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted2);
      margin-right: 4px;
      animation: dot-bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; margin-right: 0; }
    @keyframes dot-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

    /* ── Input bar ── */
    .input-bar {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .input-bar textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 9px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 12.5px;
      line-height: 1.6;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 130px;
      transition: border-color 0.15s;
      overflow-y: auto;
    }
    .input-bar textarea:focus { border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--muted); }

    .send {
      background: var(--accent);
      border: none;
      border-radius: 9px;
      width: 42px; height: 42px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    .send:hover   { opacity: 0.85; }
    .send:active  { transform: scale(0.94); }
    .send:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
    .send svg { width: 17px; height: 17px; fill: #000; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 0; }
      .chat-shell { border-radius: 0; height: 100vh; max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="chat-shell">

  <div class="header">
    <div class="pulse-ring" id="dot"></div>
    <div class="header-info">
      <div class="header-title">Local AI</div>
      <div class="header-status" id="status">connecting to tunnel…</div>
    </div>
    <div class="tunnel-tag">localhost.run</div>
  </div>

  <div class="messages" id="msgs">
    <div class="empty" id="empty">
      <div class="empty-glyph">AI</div>
      <div class="empty-label">your local model is ready<br>say something to start</div>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="inp" placeholder="message your local model…" rows="1"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="send" id="btn" onclick="send()" title="Send">
      <svg viewBox="0 0 20 20"><path d="M2 10L18 2 13 10 18 18 2 10z"/></svg>
    </button>
  </div>

</div>

<script>
  // ── CONFIG ── edit these two lines ──────────────────────────────────────
  const TUNNEL_URL = 'https://09c077c5251b99.lhr.life';   // your localhost.run URL
  const MODEL      = 'local-model';                        // model name from LM Studio
  // ────────────────────────────────────────────────────────────────────────

  const msgsEl  = document.getElementById('msgs');
  const inputEl = document.getElementById('inp');
  const btnEl   = document.getElementById('btn');
  const dotEl   = document.getElementById('dot');
  const statusEl = document.getElementById('status');
  const emptyEl  = document.getElementById('empty');

  const history = [];
  let busy = false;

  // Set initial status
  statusEl.textContent = TUNNEL_URL.replace('https://', '');

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function setStatus(state, text) {
    dotEl.className = 'pulse-ring' + (state === 'error' ? ' error' : state === 'busy' ? ' busy' : '');
    statusEl.textContent = text;
  }

  function removeEmpty() {
    if (emptyEl && emptyEl.parentNode) emptyEl.remove();
  }

  function addMsg(role, content, type) {
    removeEmpty();
    const row = document.createElement('div');
    row.className = `msg ${role === 'user' ? 'user' : 'ai'}`;

    const av = document.createElement('div');
    av.className = `av ${role === 'user' ? 'user' : 'ai'}`;
    av.textContent = role === 'user' ? 'YOU' : 'AI';

    const bub = document.createElement('div');
    bub.className = 'bubble' + (type === 'error' ? ' error' : type === 'thinking' ? ' thinking' : '');

    if (type === 'thinking') {
      const dots = document.createElement('div');
      dots.className = 'dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      bub.appendChild(dots);
    } else {
      bub.textContent = content;
    }

    row.appendChild(av);
    row.appendChild(bub);
    msgsEl.appendChild(row);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return { row, bub };
  }

  async function send() {
    if (busy) return;
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    history.push({ role: 'user', content: text });
    addMsg('user', text);

    busy = true;
    btnEl.disabled = true;
    setStatus('busy', 'generating…');

    const { row: thinkRow, bub: thinkBub } = addMsg('ai', '', 'thinking');

    try {
      const res = await fetch(`${TUNNEL_URL}/v1/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'bypass-tunnel-reminder': 'true'   // localhost.run header to skip warning page
        },
        body: JSON.stringify({
          model: MODEL,
          messages: history,
          temperature: 0.7,
          max_tokens: 1024,
          stream: false
        })
      });

      if (!res.ok) {
        const errText = await res.text().catch(() => res.statusText);
        throw new Error(`HTTP ${res.status} — ${errText.slice(0, 120)}`);
      }

      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content?.trim() || '[empty response]';

      history.push({ role: 'assistant', content: reply });
      thinkRow.remove();
      addMsg('ai', reply);
      setStatus('live', data.model || MODEL);

    } catch (err) {
      thinkRow.remove();
      let msg = err.message;
      if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
        msg = 'Cannot reach tunnel. Is LM Studio running and your SSH session open?';
      }
      addMsg('ai', msg, 'error');
      setStatus('error', 'connection failed');
    }

    busy = false;
    btnEl.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
