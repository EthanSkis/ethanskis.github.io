<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            padding: 1.5rem;
            border-bottom: 1px solid #333;
            background: #1a1a1a;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .status {
            font-size: 0.85rem;
            color: #888;
        }

        .status.connected {
            color: #4ade80;
        }

        .status.disconnected {
            color: #ef4444;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #2563eb;
            color: white;
        }

        .message.assistant .message-content {
            background: #333;
            color: #e0e0e0;
        }

        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #444;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .input-area {
            padding: 1rem;
            border-top: 1px solid #333;
            background: #1a1a1a;
            display: flex;
            gap: 0.5rem;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 0.75rem;
            border-radius: 0.25rem;
            font-size: 1rem;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            background: #2a2a2a;
        }

        button {
            padding: 0.75rem 1.5rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            background: #1d4ed8;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .error {
            color: #ef4444;
            padding: 1rem;
            background: #1a0a0a;
            border-left: 3px solid #ef4444;
            border-radius: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Local LLM Chat</h1>
            <div class="status disconnected" id="status">Checking connection...</div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-area">
            <input
                type="text"
                id="messageInput"
                placeholder="Type your message..."
                disabled
            />
            <button id="sendButton" disabled>Send</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusEl = document.getElementById('status');

// Configuration
const LOCAL_LLM_URL = 'https://pc.tailf5c50a.ts.net:11434'; // Ollama on Windows
const MODEL = 'llama3.2'; // Change if you pulled a different model
        
        let isConnected = false;
        let isWaiting = false;

        // Check connection on load
        window.addEventListener('load', async () => {
            await checkConnection();
        });

        async function checkConnection() {
            try {
                const res = await fetch(`${LOCAL_LLM_URL}/api/tags`, {
                    mode: 'cors'
                });
                if (res.ok) {
                    isConnected = true;
                    statusEl.textContent = `✓ Connected (${MODEL})`;
                    statusEl.className = 'status connected';
                    messageInput.disabled = false;
                    sendButton.disabled = false;
                } else {
                    throw new Error('No response');
                }
            } catch (err) {
                isConnected = false;
                statusEl.textContent = `✗ Cannot connect to Ollama. Is "ollama serve" running?`;
                statusEl.className = 'status disconnected';
                messageInput.disabled = true;
                sendButton.disabled = true;
            }
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function sendMessage() {
            if (!isConnected || isWaiting) return;

            const message = messageInput.value.trim();
            if (!message) return;

            messageInput.value = '';
            addMessage('user', message);

            isWaiting = true;
            sendButton.disabled = true;
            messageInput.disabled = true;

            try {
                const response = await fetch(`${LOCAL_LLM_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODEL,
                        prompt: message,
                        stream: true
                    }),
                    mode: 'cors'
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                let assistantMessage = '';
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                // Add placeholder for response
                const placeholderId = `msg-${Date.now()}`;
                const div = document.createElement('div');
                div.className = 'message assistant';
                div.id = placeholderId;
                div.innerHTML = `<div class="message-content" id="${placeholderId}-content"><span class="loading"></span></div>`;
                chatArea.appendChild(div);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.trim()) {
                            try {
                                const json = JSON.parse(line);
                                if (json.response) {
                                    assistantMessage += json.response;
                                    document.getElementById(`${placeholderId}-content`).textContent = assistantMessage;
                                    chatArea.scrollTop = chatArea.scrollHeight;
                                }
                            } catch {}
                        }
                    }
                }

                if (!assistantMessage.trim()) {
                    document.getElementById(`${placeholderId}-content`).textContent = '(No response)';
                }
            } catch (err) {
                addMessage('assistant', `❌ Error: ${err.message}`);
                await checkConnection();
            } finally {
                isWaiting = false;
                sendButton.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);
    </script>
</body>
</html>
