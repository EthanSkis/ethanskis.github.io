<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='45' r='28' fill='none' stroke='%234a9eff' stroke-width='2.5'/><circle cx='40' cy='40' r='3' fill='%234a9eff'/><circle cx='60' cy='40' r='3' fill='%234a9eff'/><path d='M38 52 Q50 62 62 52' fill='none' stroke='%234a9eff' stroke-width='2' stroke-linecap='round'/><line x1='50' y1='73' x2='50' y2='80' stroke='%234a9eff' stroke-width='2'/><line x1='38' y1='70' x2='30' y2='78' stroke='%234a9eff' stroke-width='2'/><line x1='62' y1='70' x2='70' y2='78' stroke='%234a9eff' stroke-width='2'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='81' r='50' fill='none' stroke='%234a9eff' stroke-width='5'/><circle cx='72' cy='72' r='5' fill='%234a9eff'/><circle cx='108' cy='72' r='5' fill='%234a9eff'/><path d='M68 94 Q90 112 112 94' fill='none' stroke='%234a9eff' stroke-width='4' stroke-linecap='round'/><line x1='90' y1='131' x2='90' y2='144' stroke='%234a9eff' stroke-width='4'/><line x1='68' y1='126' x2='54' y2='140' stroke='%234a9eff' stroke-width='4'/><line x1='112' y1='126' x2='126' y2='140' stroke='%234a9eff' stroke-width='4'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="header.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;transition:background-color 0.4s ease,color 0.4s ease,border-color 0.4s ease,fill 0.4s ease}
:root{
  --bg:#0c0d0f;--surface:#111214;--surface2:#17191c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8e6e1;--muted:#6b6a66;--muted2:#9a9894;
  --blue:#4a9eff;--blue-dim:rgba(74,158,255,0.10);
  --purple:#9b8cf7;--purple-dim:rgba(155,140,247,0.10);
  --green:#3dba7f;--green-dim:rgba(61,186,127,0.10);
  --red:#e24b4a;--red-dim:rgba(226,75,74,0.10);
  --bar-bg:rgba(12,13,15,0.92);
  --header-accent:#4a9eff;--header-accent-dim:rgba(74,158,255,0.15);
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',monospace;
  --sans:'Geist',system-ui,sans-serif;
}
[data-theme="light"]{
  --bg:#f5f5f0;--surface:#eaeae5;--surface2:#deded9;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.16);
  --text:#1a1a1a;--muted:#7a7a72;--muted2:#5a5a54;
  --blue:#2a7de0;--blue-dim:rgba(42,125,224,0.10);
  --purple:#7a6ad0;--purple-dim:rgba(122,106,208,0.10);
  --green:#2a8f5e;--green-dim:rgba(42,143,94,0.10);
  --red:#c43030;--red-dim:rgba(196,48,48,0.10);
  --bar-bg:rgba(245,245,240,0.92);
  --header-accent:#2a7de0;--header-accent-dim:rgba(42,125,224,0.15);
}
html{scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none}html::-webkit-scrollbar{display:none}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;padding-bottom:88px}

/* ── Chat Layout ── */
.chat-top-bar{position:fixed;top:52px;left:0;right:0;background:var(--bar-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:50}
.chat-top-bar-inner{max-width:800px;margin:0 auto;padding:1rem;display:flex;align-items:center;justify-content:space-between}
.chat-bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bar-bg);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:50}
.chat-bottom-bar-inner{max-width:800px;margin:0 auto;padding:.75rem 1rem 1rem;display:flex;gap:8px;align-items:flex-end}
.chat-wrap{max-width:800px;width:100%;margin:72px auto 0;padding:0 1rem;position:relative}
.chat-title{font-family:var(--serif);font-size:28px;color:var(--text);letter-spacing:-.02em}
.chat-actions{display:flex;gap:8px;align-items:center}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
.status-dot.connected{background:var(--green)}
.status-dot.error{background:var(--red)}
.clear-btn{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;letter-spacing:.04em;transition:all .2s}
.clear-btn:hover{color:var(--text);border-color:var(--blue)}

/* ── Messages ── */
.messages{padding:1rem 0;display:flex;flex-direction:column;gap:20px}
.msg{display:flex;animation:msgIn .25s ease}
.msg.user{align-self:flex-end;max-width:85%}
.msg.bot{align-self:stretch;width:100%;max-width:100%}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-bubble{font-size:13.5px;line-height:1.65;word-break:break-word}
.msg.user .msg-bubble{padding:10px 14px;border-radius:12px;background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.msg.bot .msg-bubble{color:var(--text);width:100%}
.msg.bot .msg-bubble pre{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:12px;line-height:1.5}
.msg.bot .msg-bubble code{font-family:var(--mono);font-size:12px;background:var(--surface2);padding:1px 5px;border-radius:3px}
.msg.bot .msg-bubble pre code{background:none;padding:0;border-radius:0}
.msg.bot .msg-bubble hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.msg.bot .msg-bubble .tbl{overflow-x:auto;margin:12px 0}
.msg.bot .msg-bubble table{border-collapse:collapse;font-size:13px}
.msg.bot .msg-bubble th,.msg.bot .msg-bubble td{border:1px solid var(--border);padding:6px 10px;text-align:left;vertical-align:top}
.msg.bot .msg-bubble th{background:var(--surface2);font-weight:500;color:var(--text)}
.msg.bot .msg-bubble tbody tr:nth-child(even) td{background:var(--surface)}

/* ── Typing Indicator ── */
.typing{display:flex;align-self:stretch;width:100%;animation:msgIn .25s ease}
.typing-dots{display:inline-flex;gap:4px;padding:6px 0;align-self:flex-start}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── Welcome ── */
.welcome{min-height:calc(100vh - 260px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;padding:2rem}
.welcome-icon{font-size:40px;opacity:.6}
.welcome h2{font-family:var(--serif);font-size:24px;color:var(--text);font-weight:400}
.welcome p{font-size:13px;color:var(--muted);max-width:400px;line-height:1.6}

/* ── Input ── */
.chat-bottom-bar-inner textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);font-family:var(--sans);resize:none;outline:none;line-height:1.5;max-height:120px;min-height:42px;transition:border-color .15s}
.chat-bottom-bar-inner textarea:focus{border-color:var(--blue)}
.chat-bottom-bar-inner textarea::placeholder{color:var(--muted)}
.send-btn{width:42px;height:42px;border-radius:10px;border:none;background:var(--blue);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .15s;flex-shrink:0}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{width:18px;height:18px}

/* ── Error Banner ── */
.error-banner{background:var(--red-dim);border:1px solid rgba(226,75,74,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);font-family:var(--mono);display:none;margin-bottom:8px;line-height:1.5}


/* ── Mobile ── */
@media(max-width:600px){
  body{padding-bottom:84px}
  .chat-top-bar{top:48px}
  .chat-top-bar-inner{padding:.75rem 1rem}
  .chat-bottom-bar-inner{padding:.5rem 1rem .75rem}
  .chat-wrap{margin-top:56px}
  .chat-title{font-size:22px}
  .msg.user{max-width:92%}
  .welcome{min-height:calc(100vh - 220px)}
  .welcome h2{font-size:20px}
}
</style>
</head>
<body>

<header>
  <div class="wm"><div class="dot"></div>AI Chat</div>
  <div class="hdr-r">
    <nav class="hdr-nav">
      <a href="/" class="nav-link">Portfolio</a>
      <a href="/news" class="nav-link">News</a>
      <a href="/notes" class="nav-link">Notes</a>

      <a href="/html" class="nav-link">Editor</a>
      <a href="/ai" class="nav-link active">AI</a>
    </nav>
    <button id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀</button>
    <div style="position:relative;display:inline-flex">
      <button class="menu-btn" onclick="toggleMenu(event)" title="Menu">
        <div class="menu-bar"></div>
        <div class="menu-bar"></div>
        <div class="menu-bar"></div>
      </button>
      <nav class="nav-menu" id="navMenu">
        <a href="/" class="nav-link">Portfolio</a>
        <a href="/news" class="nav-link">News</a>
        <a href="/notes" class="nav-link">Notes</a>
        <a href="/snake" class="nav-link">Snake</a>
        <a href="/html" class="nav-link">Editor</a>
        <a href="/ai" class="nav-link active">AI</a>
      </nav>
    </div>
  </div>
</header>
<script src="header.js"></script>

<div class="chat-top-bar">
  <div class="chat-top-bar-inner">
    <h1 class="chat-title">ethAI</h1>
    <div class="chat-actions">
      <div class="status-dot" id="statusDot" title="Server status"></div>
      <button class="clear-btn" onclick="clearChat()">Clear</button>
    </div>
  </div>
</div>

<div class="chat-wrap">
  <div class="error-banner" id="errorBanner"></div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">AI</div>
      <h2>What can I help with?</h2>
      <p>Type a message to start chatting.</p>
    </div>
  </div>
</div>

<div class="chat-bottom-bar">
  <div class="chat-bottom-bar-inner">
    <textarea id="chatInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
  const AI_BOT_TOKEN = '8716871218:AAEKr0qif2eb_mvQIkmgNrQfsfAKDd_cVO0';
  const CHAT_ID = '7626254420';

  // Resolved at startup: tunnel.json → CI-injected fallback
  const CI_URL = '';
  let _serverUrl = CI_URL;

  function getServerUrl() { return _serverUrl; }

  async function initServerUrl() {
    // 1. tunnel.json — update this file to change the active URL without redeploying
    try {
      const r = await fetch('/tunnel.json?_=' + Date.now());
      if (r.ok) {
        const d = await r.json();
        if (d.url && d.url.trim()) { _serverUrl = d.url.trim(); return; }
      }
    } catch {}
    // 2. Fall back to CI-injected URL
    _serverUrl = CI_URL;
  }

  const HISTORY_KEY = 'ethAI_chat_history';
  let conversationHistory = [];
  let isGenerating = false;

  // ── Persistence ──
  function saveHistory() {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(conversationHistory)); } catch {}
  }

  function restoreHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      if (!Array.isArray(saved) || saved.length === 0) return;
      conversationHistory = saved;
      for (const msg of saved) {
        const role = msg.role === 'assistant' ? 'bot' : 'user';
        addMessage(role, msg.content, { skipPersist: true });
      }
      scrollToBottom();
    } catch {}
  }

  function scrollToBottom() {
    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'instant' });
  }

  // ── Boot ──
  (async () => {
    restoreHistory();
    await initServerUrl();
    checkServer();
  })();

  // ── Health Check ──
  async function checkServer() {
    const dot = document.getElementById('statusDot');
    try {
      const r = await fetch(getServerUrl() + '/health', { signal: AbortSignal.timeout(4000), headers: { 'ngrok-skip-browser-warning': '1' } });
      if (r.ok) { dot.className = 'status-dot connected'; dot.title = 'AI online'; }
      else throw new Error();
    } catch {
      dot.className = 'status-dot error';
      dot.title = 'AI offline';
    }
  }
  setInterval(checkServer, 15000);

  // ── Auto-resize textarea ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Keyboard ──
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Render Helpers ──
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatBotText(text) {
    // Block-level elements are stashed behind opaque placeholders so
    // later inline/line-break passes can't mangle their HTML.
    const blocks = [];
    const stash = (html) => {
      const i = blocks.length;
      blocks.push(html);
      return '\u0000BLK' + i + '\u0000';
    };

    // 1. Fenced code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
      return stash('<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
    });

    // Inline formatter (reused for table cells and the main pass)
    const formatInline = (s) =>
      s.replace(/`([^`]+)`/g, '<code>$1</code>')
       .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
       .replace(/\*(.+?)\*/g, '<em>$1</em>');

    // 2. Line-based pass: horizontal rules + GFM pipe tables
    const parseRow = (line) => {
      let s = line.trim();
      if (s.startsWith('|')) s = s.slice(1);
      if (s.endsWith('|')) s = s.slice(0, -1);
      return s.split('|').map(c => c.trim());
    };
    const parseAligns = (line) => parseRow(line).map(cell => {
      const l = cell.startsWith(':'), r = cell.endsWith(':');
      if (l && r) return 'center';
      if (r) return 'right';
      if (l) return 'left';
      return null;
    });

    const lines = text.split('\n');
    const out = [];
    for (let i = 0; i < lines.length;) {
      const line = lines[i];

      // Horizontal rule: a line of 3+ dashes, asterisks, or underscores
      if (/^\s*(?:-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
        out.push(stash('<hr>'));
        i++;
        continue;
      }

      // GFM pipe table: header row followed by a separator row
      if (
        /^\s*\|/.test(line) &&
        i + 1 < lines.length &&
        /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(lines[i + 1])
      ) {
        const header = parseRow(line);
        const aligns = parseAligns(lines[i + 1]);
        i += 2;
        const rows = [];
        while (i < lines.length && /^\s*\|/.test(lines[i])) {
          rows.push(parseRow(lines[i]));
          i++;
        }
        const cellStyle = (idx) => aligns[idx] ? ' style="text-align:' + aligns[idx] + '"' : '';
        let t = '<div class="tbl"><table><thead><tr>';
        header.forEach((h, idx) => { t += '<th' + cellStyle(idx) + '>' + formatInline(h) + '</th>'; });
        t += '</tr></thead><tbody>';
        rows.forEach(row => {
          t += '<tr>';
          row.forEach((c, idx) => { t += '<td' + cellStyle(idx) + '>' + formatInline(c) + '</td>'; });
          t += '</tr>';
        });
        t += '</tbody></table></div>';
        out.push(stash(t));
        continue;
      }

      out.push(line);
      i++;
    }

    let html = out.join('\n');

    // 3. Inline formatting on remaining text
    html = formatInline(html);

    // 4. Line breaks
    html = html.replace(/\n/g, '<br>');

    // 5. Strip <br> adjacent to block placeholders — their own margins handle spacing
    html = html.replace(/(?:<br>\s*)+(\u0000BLK\d+\u0000)/g, '$1');
    html = html.replace(/(\u0000BLK\d+\u0000)(?:\s*<br>)+/g, '$1');

    // 6. Restore stashed block HTML
    html = html.replace(/\u0000BLK(\d+)\u0000/g, (_, idx) => blocks[idx]);

    return html;
  }

  function addMessage(role, text, opts) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (role === 'user') {
      bubble.textContent = text;
    } else {
      bubble.innerHTML = formatBotText(text);
    }

    div.appendChild(bubble);
    container.appendChild(div);
    if (!(opts && opts.skipPersist)) scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    container.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function showError(msg) {
    const banner = document.getElementById('errorBanner');
    banner.textContent = msg;
    banner.style.display = 'block';
    setTimeout(() => { banner.style.display = 'none'; }, 8000);
  }

  // ── Send Message ──
  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isGenerating) return;

    isGenerating = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    saveHistory();

    showTyping();

    try {
      const res = await fetch(getServerUrl() + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain', 'ngrok-skip-browser-warning': '1' },
        body: JSON.stringify({ message: text, history: conversationHistory.slice(0, -1) })
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err || 'Server error ' + res.status);
      }

      removeTyping();

      const bubble = addMessage('bot', '');
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullResponse = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.token) {
                fullResponse += parsed.token;
                bubble.innerHTML = formatBotText(fullResponse);
                scrollToBottom();
              }
              if (parsed.error) {
                showError(parsed.error);
              }
            } catch {}
          }
        }
      }

      if (fullResponse) {
        conversationHistory.push({ role: 'assistant', content: fullResponse });
        saveHistory();
        scrollToBottom();
      }

    } catch (err) {
      removeTyping();
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('fetch')) {
        showError('AI is currently offline. Please try again later.');
      } else {
        showError(err.message);
      }
    } finally {
      isGenerating = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
  }

  // ── Clear Chat ──
  function clearChat() {
    conversationHistory = [];
    try { localStorage.removeItem(HISTORY_KEY); } catch {}
    const container = document.getElementById('messages');
    container.innerHTML = '<div class="welcome" id="welcome"><div class="welcome-icon">AI</div><h2>What can I help with?</h2><p>Type a message to start chatting.</p></div>';
  }
</script>
</body>
</html>
